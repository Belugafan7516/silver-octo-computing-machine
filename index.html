<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power Studios Portal</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel standalone for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 antialiased selection:bg-blue-200">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCtbA4ro1ZU429f9HTn29DHjVCpq4t-N-s",
            authDomain: "kisok-a496b.firebaseapp.com",
            projectId: "kisok-a496b",
            storageBucket: "kisok-a496b.firebasestorage.app",
            messagingSenderId: "850722698358",
            appId: "1:850722698358:web:a1603cbb7aafccecebdb57",
            measurementId: "G-E8KG84NDCQ"
        };

        const appId = "kisok-a496b";
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        function App() {
            const [email, setEmail] = useState('default@eugeneevons.com');
            const [password, setPassword] = useState('kiosk1');
            const [error, setError] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [user, setUser] = useState(null);

            // App State
            const [nfcLog, setNfcLog] = useState([]);
            const [isScanning, setIsScanning] = useState(false);
            
            // Workflow State
            const [activeAction, setActiveAction] = useState(null); // 'REGISTER' | 'PAY' | 'TOP_UP' | 'DELETE' | 'BALANCE'
            const [amount, setAmount] = useState('');
            const [customerEmail, setCustomerEmail] = useState('');
            const [actionResult, setActionResult] = useState(null); // Stores success or error info for display in Box 2

            // Refs for NFC Event Listener to handle state closures
            const actionRef = useRef(null);
            const amountRef = useRef(null);
            const customerEmailRef = useRef(null);

            useEffect(() => {
                actionRef.current = activeAction;
                amountRef.current = amount;
                customerEmailRef.current = customerEmail;
                // Clear the result when switching or clearing actions
                if (!activeAction) setActionResult(null);
            }, [activeAction, amount, customerEmail]);

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                    if (currentUser) startNfcPersistentScanner();
                });
                return () => unsubscribe();
            }, []);

            const addLog = (msg, type = 'info') => {
                setNfcLog(prev => [{ id: Date.now() + Math.random(), time: new Date().toLocaleTimeString(), msg, type }, ...prev]);
            };

            const startNfcPersistentScanner = async () => {
                try {
                    if (!('NDEFReader' in window)) {
                        addLog('Web NFC not supported.', 'error');
                        return;
                    }
                    const ndef = new NDEFReader();
                    await ndef.scan();
                    setIsScanning(true);
                    addLog('System Online. Select an action below.', 'success');

                    ndef.addEventListener("reading", async ({ serialNumber, message }) => {
                        const action = actionRef.current;
                        const currentAmount = parseFloat(amountRef.current);
                        const currentEmail = customerEmailRef.current;

                        if (!action) {
                            addLog(`Card Tapped (${serialNumber}). Select an action first.`, 'info');
                            return;
                        }

                        setActionResult({ status: 'processing', message: 'Processing tag...' });

                        try {
                            const tagRef = doc(db, 'artifacts', appId, 'public', 'data', 'tags', serialNumber);
                            
                            switch (action) {
                                case 'BALANCE':
                                    const balSnap = await getDoc(tagRef);
                                    if (balSnap.exists()) {
                                        const data = balSnap.data();
                                        setActionResult({ 
                                            status: 'success', 
                                            type: 'balance',
                                            data: { ...data, serial: serialNumber } 
                                        });
                                        addLog(`[BALANCE] Customer: ${data.customerEmail} | Credit: $${data.balance.toFixed(2)}`, 'success');
                                    } else {
                                        throw new Error(`Card ${serialNumber} is not registered.`);
                                    }
                                    break;

                                case 'REGISTER':
                                    if (!currentEmail) throw new Error("Missing customer email.");
                                    const internalId = `PS-${Math.random().toString(36).substr(2, 6).toUpperCase()}`;
                                    
                                    await ndef.write({
                                        records: [
                                            { recordType: "text", data: `ID: ${internalId}` },
                                            { recordType: "text", data: `Customer: ${currentEmail}` }
                                        ]
                                    });
                                    
                                    await setDoc(tagRef, {
                                        balance: 0,
                                        customerEmail: currentEmail,
                                        internalId: internalId,
                                        registeredAt: new Date().toISOString()
                                    });
                                    
                                    setActionResult({ status: 'success', message: `Registered: ${currentEmail}` });
                                    addLog(`Registered & Linked: ${currentEmail}`, 'success');
                                    setCustomerEmail('');
                                    break;

                                case 'TOP_UP':
                                    if (isNaN(currentAmount) || currentAmount <= 0) throw new Error("Invalid amount.");
                                    const topSnap = await getDoc(tagRef);
                                    if (!topSnap.exists()) throw new Error("Card not registered.");
                                    
                                    const newTopBalance = topSnap.data().balance + currentAmount;
                                    await updateDoc(tagRef, { balance: newTopBalance });
                                    
                                    setActionResult({ status: 'success', message: `Added $${currentAmount.toFixed(2)}. New Balance: $${newTopBalance.toFixed(2)}` });
                                    addLog(`Deposit Success: +$${currentAmount.toFixed(2)}`, 'success');
                                    setAmount('');
                                    break;

                                case 'PAY':
                                    if (isNaN(currentAmount) || currentAmount <= 0) throw new Error("Invalid amount.");
                                    const paySnap = await getDoc(tagRef);
                                    if (!paySnap.exists()) throw new Error("Card not registered.");
                                    
                                    const currentBal = paySnap.data().balance;
                                    if (currentBal < currentAmount) throw new Error("Insufficient funds.");
                                    
                                    const newPayBalance = currentBal - currentAmount;
                                    await updateDoc(tagRef, { balance: newPayBalance });
                                    
                                    setActionResult({ status: 'success', message: `Payment successful. Remaining: $${newPayBalance.toFixed(2)}` });
                                    addLog(`Payment Success: -$${currentAmount.toFixed(2)}`, 'success');
                                    setAmount('');
                                    break;

                                case 'DELETE':
                                    await deleteDoc(tagRef);
                                    setActionResult({ status: 'success', message: `Customer record for ${serialNumber} deleted.` });
                                    addLog(`Record wiped for card ${serialNumber}`, 'success');
                                    break;
                            }
                        } catch (err) {
                            setActionResult({ status: 'error', message: err.message });
                            addLog(`Error: ${err.message}`, 'error');
                        }
                    });
                } catch (error) {
                    addLog(`NFC Setup Error: ${error.message}`, 'error');
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                setIsLoading(true);
                try {
                    await signInWithEmailAndPassword(auth, email, password);
                } catch (err) {
                    setError(`Auth Failed: ${err.message}`);
                } finally {
                    setIsLoading(false);
                }
            };

            if (user) {
                return (
                    <div className="min-h-screen bg-slate-50 p-4 lg:p-8">
                        <div className="max-w-5xl mx-auto space-y-6">
                            {/* App Header */}
                            <header className="bg-white rounded-3xl shadow-sm p-6 flex items-center justify-between border border-slate-200">
                                <div className="flex items-center space-x-4">
                                    <div className="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg rotate-3">
                                        <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                                    </div>
                                    <div>
                                        <h1 className="text-xl font-black text-slate-900 tracking-tight">Power Studios Terminal</h1>
                                        <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">{user.email}</p>
                                    </div>
                                </div>
                                <button onClick={() => signOut(auth)} className="text-[10px] font-black text-slate-400 hover:text-red-500 uppercase tracking-[0.2em] transition-all">Sign Out</button>
                            </header>

                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                {/* Left Column: Selection */}
                                <div className="lg:col-span-2 space-y-6">
                                    <div className="bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-200">
                                        <h2 className="text-xs font-black text-slate-400 uppercase tracking-[0.3em] mb-8">1. Select Operation</h2>
                                        
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                            {/* Register Option */}
                                            <button 
                                                onClick={() => { setActiveAction('REGISTER'); setActionResult(null); }}
                                                className={`p-6 rounded-3xl border-2 text-left transition-all group ${activeAction === 'REGISTER' ? 'border-blue-600 bg-blue-50/50 ring-4 ring-blue-600/5' : 'border-slate-100 hover:border-slate-200'}`}
                                            >
                                                <div className={`w-10 h-10 rounded-xl flex items-center justify-center mb-4 transition-colors ${activeAction === 'REGISTER' ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-400'}`}>
                                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>
                                                </div>
                                                <h3 className="font-black text-slate-900 uppercase text-sm mb-1 tracking-tight">New Customer</h3>
                                                <p className="text-xs text-slate-400 font-medium">Link card to email.</p>
                                            </button>

                                            {/* Balance Option */}
                                            <button 
                                                onClick={() => { setActiveAction('BALANCE'); setActionResult(null); }}
                                                className={`p-6 rounded-3xl border-2 text-left transition-all group ${activeAction === 'BALANCE' ? 'border-slate-900 bg-slate-900 text-white' : 'border-slate-100 hover:border-slate-200'}`}
                                            >
                                                <div className={`w-10 h-10 rounded-xl flex items-center justify-center mb-4 transition-colors ${activeAction === 'BALANCE' ? 'bg-white text-slate-900 shadow-sm' : 'bg-slate-100 text-slate-400'}`}>
                                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                                                </div>
                                                <h3 className={`font-black uppercase text-sm mb-1 tracking-tight ${activeAction === 'BALANCE' ? 'text-white' : 'text-slate-900'}`}>Check Balance</h3>
                                                <p className={`text-xs font-medium ${activeAction === 'BALANCE' ? 'text-slate-400' : 'text-slate-400'}`}>Verify credit status.</p>
                                            </button>

                                            {/* Top Up Option */}
                                            <button 
                                                onClick={() => { setActiveAction('TOP_UP'); setActionResult(null); }}
                                                className={`p-6 rounded-3xl border-2 text-left transition-all group ${activeAction === 'TOP_UP' ? 'border-emerald-600 bg-emerald-50/50 ring-4 ring-emerald-600/5' : 'border-slate-100 hover:border-slate-200'}`}
                                            >
                                                <div className={`w-10 h-10 rounded-xl flex items-center justify-center mb-4 transition-colors ${activeAction === 'TOP_UP' ? 'bg-emerald-600 text-white' : 'bg-slate-100 text-slate-400'}`}>
                                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>
                                                </div>
                                                <h3 className="font-black text-slate-900 uppercase text-sm mb-1 tracking-tight">Add Credits</h3>
                                                <p className="text-xs text-slate-400 font-medium">Deposit funds.</p>
                                            </button>

                                            {/* Pay Option */}
                                            <button 
                                                onClick={() => { setActiveAction('PAY'); setActionResult(null); }}
                                                className={`p-6 rounded-3xl border-2 text-left transition-all group ${activeAction === 'PAY' ? 'border-amber-600 bg-amber-50/50 ring-4 ring-amber-600/5' : 'border-slate-100 hover:border-slate-200'}`}
                                            >
                                                <div className={`w-10 h-10 rounded-xl flex items-center justify-center mb-4 transition-colors ${activeAction === 'PAY' ? 'bg-amber-600 text-white' : 'bg-slate-100 text-slate-400'}`}>
                                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
                                                </div>
                                                <h3 className="font-black text-slate-900 uppercase text-sm mb-1 tracking-tight">Kiosk Sale</h3>
                                                <p className="text-xs text-slate-400 font-medium">Charge card.</p>
                                            </button>
                                        </div>
                                    </div>

                                    {/* Action Configuration & Results Box */}
                                    {activeAction && (
                                        <div className="bg-white rounded-[2.5rem] p-8 shadow-xl border-4 border-slate-900 animate-in fade-in slide-in-from-bottom-4 duration-300">
                                            <div className="flex items-center justify-between mb-8">
                                                <h2 className="text-xs font-black text-slate-400 uppercase tracking-[0.3em]">2. Configuration / Result</h2>
                                                <button onClick={() => { setActiveAction(null); setActionResult(null); }} className="text-red-500 font-black text-[10px] uppercase">Cancel Action</button>
                                            </div>

                                            {/* Result Display Overlays */}
                                            {actionResult ? (
                                                <div className="space-y-6">
                                                    {actionResult.status === 'error' && (
                                                        <div className="bg-red-50 border-2 border-red-200 p-6 rounded-3xl text-center">
                                                            <div className="w-12 h-12 bg-red-500 rounded-full flex items-center justify-center mx-auto mb-4 text-white">
                                                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"/></svg>
                                                            </div>
                                                            <p className="text-red-800 font-black uppercase text-xs tracking-widest mb-2">Error Occurred</p>
                                                            <p className="text-red-600 font-bold leading-relaxed">{actionResult.message}</p>
                                                            <button 
                                                                onClick={() => setActionResult(null)}
                                                                className="mt-6 px-6 py-2 bg-red-600 text-white rounded-full text-[10px] font-black uppercase tracking-widest active:scale-95"
                                                            >
                                                                Dismiss & Try Again
                                                            </button>
                                                        </div>
                                                    )}

                                                    {actionResult.status === 'success' && actionResult.type === 'balance' && (
                                                        <div className="bg-emerald-50 border-2 border-emerald-200 p-8 rounded-[2rem] text-center">
                                                            <p className="text-[10px] text-emerald-600 font-black uppercase tracking-[0.3em] mb-4">Customer Balance Found</p>
                                                            <p className="text-6xl font-black text-emerald-800 mb-4">${actionResult.data.balance.toFixed(2)}</p>
                                                            <div className="space-y-1">
                                                                <p className="text-xs font-bold text-emerald-700">{actionResult.data.customerEmail}</p>
                                                                <p className="text-[10px] font-mono text-emerald-600 opacity-60">Serial: {actionResult.data.serial}</p>
                                                            </div>
                                                            <button 
                                                                onClick={() => setActionResult(null)}
                                                                className="mt-8 px-8 py-3 bg-emerald-600 text-white rounded-2xl text-[10px] font-black uppercase tracking-widest active:scale-95 shadow-lg shadow-emerald-200"
                                                            >
                                                                Clear Result
                                                            </button>
                                                        </div>
                                                    )}

                                                    {actionResult.status === 'success' && !actionResult.type && (
                                                        <div className="bg-emerald-50 border-2 border-emerald-200 p-6 rounded-3xl text-center">
                                                            <div className="w-12 h-12 bg-emerald-500 rounded-full flex items-center justify-center mx-auto mb-4 text-white">
                                                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M5 13l4 4L19 7"/></svg>
                                                            </div>
                                                            <p className="text-emerald-800 font-black uppercase text-xs tracking-widest mb-1">Success</p>
                                                            <p className="text-emerald-600 font-bold">{actionResult.message}</p>
                                                            <button 
                                                                onClick={() => setActionResult(null)}
                                                                className="mt-6 px-6 py-2 bg-emerald-600 text-white rounded-full text-[10px] font-black uppercase tracking-widest active:scale-95"
                                                            >
                                                                Dismiss
                                                            </button>
                                                        </div>
                                                    )}

                                                    {actionResult.status === 'processing' && (
                                                        <div className="py-12 text-center">
                                                            <div className="w-10 h-10 border-4 border-slate-200 border-t-slate-900 rounded-full animate-spin mx-auto mb-4"></div>
                                                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">{actionResult.message}</p>
                                                        </div>
                                                    )}
                                                </div>
                                            ) : (
                                                /* Configuration Inputs (Visible when no result is present) */
                                                <div className="space-y-6">
                                                    {activeAction === 'REGISTER' && (
                                                        <div className="space-y-4">
                                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Customer Email</label>
                                                            <input 
                                                                type="email" 
                                                                value={customerEmail}
                                                                onChange={(e) => setCustomerEmail(e.target.value)}
                                                                className="w-full bg-slate-50 border border-slate-200 rounded-2xl px-6 py-5 font-bold text-slate-900 outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all shadow-inner"
                                                                placeholder="customer@email.com"
                                                            />
                                                        </div>
                                                    )}

                                                    {(activeAction === 'TOP_UP' || activeAction === 'PAY') && (
                                                        <div className="space-y-4">
                                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Amount</label>
                                                            <div className="relative">
                                                                <span className="absolute left-6 top-1/2 -translate-y-1/2 text-3xl font-black text-slate-300">$</span>
                                                                <input 
                                                                    type="number" 
                                                                    value={amount}
                                                                    onChange={(e) => setAmount(e.target.value)}
                                                                    className="w-full bg-slate-50 border border-slate-200 rounded-2xl pl-12 pr-6 py-6 font-black text-4xl text-slate-800 outline-none focus:border-slate-900 transition-all shadow-inner"
                                                                    placeholder="0.00"
                                                                />
                                                            </div>
                                                        </div>
                                                    )}

                                                    {activeAction === 'BALANCE' && (
                                                        <div className="py-10 text-center">
                                                            <div className="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-6">
                                                                <svg className="w-10 h-10 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                                                            </div>
                                                            <p className="font-black text-slate-900 uppercase tracking-tight">Scanner Ready</p>
                                                            <p className="text-xs text-slate-400 mt-2 font-medium">Tap customer card to view current balance.</p>
                                                        </div>
                                                    )}

                                                    {/* Waiting for Tap Prompt */}
                                                    <div className="mt-8 p-6 bg-slate-900 rounded-3xl text-white flex items-center justify-between shadow-xl">
                                                        <div className="flex items-center space-x-4">
                                                            <div className="w-10 h-10 rounded-full border-2 border-dashed border-white/30 flex items-center justify-center animate-spin-slow">
                                                                <svg className="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
                                                            </div>
                                                            <div>
                                                                <p className="font-black uppercase text-[10px] tracking-widest text-white/50">Instruction</p>
                                                                <p className="text-xs font-bold uppercase tracking-tighter">Tap Physical Card Now</p>
                                                            </div>
                                                        </div>
                                                        <div className="h-2 w-2 rounded-full bg-emerald-400 animate-pulse"></div>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>

                                {/* Right Column: Activity Feed */}
                                <div className="bg-slate-900 rounded-[2.5rem] shadow-2xl p-8 border border-slate-800 flex flex-col h-[600px] lg:h-auto">
                                    <div className="flex justify-between items-center mb-8">
                                        <h3 className="text-xs font-black text-slate-500 uppercase tracking-[0.3em]">Activity Stream</h3>
                                        <button onClick={() => setNfcLog([])} className="text-[9px] bg-slate-800 px-4 py-1.5 rounded-full text-slate-400 font-black uppercase tracking-widest transition-colors hover:text-white">Clear</button>
                                    </div>
                                    <div className="flex-1 overflow-y-auto space-y-6 pr-2 custom-scrollbar">
                                        {nfcLog.length === 0 ? (
                                            <div className="flex flex-col items-center justify-center h-full opacity-10">
                                                <svg className="w-16 h-16 mb-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16m-7 6h7"/></svg>
                                                <p className="text-white font-black text-[10px] uppercase tracking-widest">No Recent Activity</p>
                                            </div>
                                        ) : (
                                            nfcLog.map((log) => (
                                                <div key={log.id} className="group relative">
                                                    <div className="flex items-center space-x-3 mb-2">
                                                        <span className="text-slate-600 font-mono text-[10px]">{log.time}</span>
                                                        <div className="h-[1px] flex-1 bg-slate-800"></div>
                                                        <span className={`px-2 py-0.5 rounded-sm text-[8px] font-black uppercase tracking-tighter ${log.type === 'error' ? 'bg-red-500 text-white' : log.type === 'success' ? 'bg-emerald-500 text-white' : 'bg-blue-600 text-white'}`}>
                                                            {log.type}
                                                        </span>
                                                    </div>
                                                    <p className="text-slate-200 text-xs font-semibold pl-4 border-l border-slate-800 group-hover:border-slate-600 transition-all break-words leading-relaxed">{log.msg}</p>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            // Login Screen logic remains same for consistency
            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="max-w-md w-full bg-white rounded-[3rem] shadow-2xl p-10 lg:p-14 border border-slate-100 overflow-hidden relative">
                        <div className="text-center mb-14 relative z-10">
                            <div className="mx-auto w-24 h-24 bg-blue-600 rounded-[2rem] flex items-center justify-center mb-8 shadow-xl rotate-3">
                                <svg className="w-12 h-12 text-white -rotate-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3.5" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                            </div>
                            <h2 className="text-4xl font-black text-slate-900 tracking-tighter">Power Studios</h2>
                            <p className="text-[10px] text-slate-400 font-black uppercase tracking-[0.4em] mt-4">Authorized Terminal Login</p>
                        </div>
                        <form onSubmit={handleSubmit} className="space-y-6 relative z-10">
                            {error && <div className="bg-red-50 border-2 border-red-100 p-4 rounded-2xl text-[10px] text-red-700 font-black uppercase tracking-tight">{error}</div>}
                            <div className="space-y-4">
                                <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} className="block w-full px-7 py-5 bg-slate-50 border-2 border-slate-100 rounded-3xl focus:border-blue-500 focus:bg-white focus:outline-none transition-all text-sm font-bold shadow-inner" placeholder="Email"/>
                                <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} className="block w-full px-7 py-5 bg-slate-50 border-2 border-slate-100 rounded-3xl focus:border-blue-500 focus:bg-white focus:outline-none transition-all text-sm font-bold shadow-inner" placeholder="Password"/>
                            </div>
                            <button type="submit" disabled={isLoading} className="w-full py-5 rounded-3xl shadow-xl shadow-blue-600/20 text-xs font-black text-white bg-blue-600 hover:bg-blue-700 transform transition-all active:scale-95 flex items-center justify-center uppercase tracking-widest">
                                {isLoading ? 'Verifying...' : 'Launch Terminal'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 3px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow { animation: spin-slow 8s linear infinite; }
    </style>
</body>
</html>
