<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power Studios Portal</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel standalone for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 antialiased selection:bg-blue-200">
    <!-- React will mount here -->
    <div id="root"></div>

    <!-- Note the type="text/babel" and data-type="module" which is crucial for Babel to process ES imports -->
    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect } = React;

        // Initialize Firebase using the environment config
        let auth, db;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        try {
            if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                const firebaseConfig = JSON.parse(__firebase_config);
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
            }
        } catch (error) {
            console.error("Error initializing Firebase:", error);
        }

        function App() {
            const [email, setEmail] = useState('default@eugeneevons.com');
            const [password, setPassword] = useState('kiosk1');
            const [error, setError] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [user, setUser] = useState(null);
            const [isOfflineMode, setIsOfflineMode] = useState(false);

            // NFC States
            const [nfcLog, setNfcLog] = useState([]);
            const [isScanning, setIsScanning] = useState(false);
            
            // New Tag Management States
            const [currentTagSerial, setCurrentTagSerial] = useState(null);
            const [tagData, setTagData] = useState(null);
            const [amount, setAmount] = useState('');
            const [localTagsDb, setLocalTagsDb] = useState({}); // Fallback memory store

            // Listen for Firebase auth state changes
            useEffect(() => {
                if (!auth) return;
                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    if (!isOfflineMode) {
                        setUser(currentUser);
                    }
                });
                return () => unsubscribe();
            }, [isOfflineMode]);

            // Listen for active tag data via Firestore (or local state if offline)
            useEffect(() => {
                if (!user || !currentTagSerial) return;

                if (isOfflineMode) {
                    setTagData(localTagsDb[currentTagSerial] || null);
                    return;
                }

                if (!db) return;
                const tagRef = doc(db, 'artifacts', appId, 'public', 'data', 'tags', currentTagSerial);
                const unsubscribe = onSnapshot(tagRef, (docSnap) => {
                    if (docSnap.exists()) {
                        setTagData(docSnap.data());
                    } else {
                        setTagData(null);
                    }
                }, (err) => {
                    addLog(`Fetch Error: ${err.message}`, 'error');
                });
                return () => unsubscribe();
            }, [user, currentTagSerial, isOfflineMode, localTagsDb]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                
                if (!email || !password) {
                    setError('Please fill in both your email and password.');
                    return;
                }
                
                if (!email.endsWith('@eugeneevons.com')) {
                    setError('Access denied. Only @eugeneevons.com email addresses are authorized.');
                    return;
                }

                if (email === 'default@eugeneevons.com' && password !== 'kiosk1') {
                    setError('Incorrect password for the default kiosk account.');
                    return;
                }

                setIsLoading(true);

                try {
                    if (!auth) throw new Error("Firebase configuration missing in this environment.");
                    
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (err) {
                    console.warn("Secure Auth Failed, engaging fallback mode:", err);
                    // Automatically fallback to offline demo mode so Android NFC testing works
                    setIsOfflineMode(true);
                    setUser({ email, uid: 'offline-demo' });
                } finally {
                    setIsLoading(false);
                }
            };

            const handleSignOut = async () => {
                if (auth && !isOfflineMode) {
                    await signOut(auth);
                }
                setEmail('default@eugeneevons.com');
                setPassword('kiosk1');
                setNfcLog([]);
                setIsScanning(false);
                setCurrentTagSerial(null);
                setTagData(null);
                setUser(null);
                setIsOfflineMode(false);
            };

            const handleRegister = async () => {
                if (!currentTagSerial) return;
                try {
                    if (isOfflineMode) {
                        setLocalTagsDb(prev => ({ ...prev, [currentTagSerial]: { balance: 0, registeredAt: new Date().toISOString() } }));
                        addLog(`Registered Tag: ${currentTagSerial} (Offline Mode)`, 'success');
                        return;
                    }

                    const tagRef = doc(db, 'artifacts', appId, 'public', 'data', 'tags', currentTagSerial);
                    await setDoc(tagRef, { balance: 0, registeredAt: new Date().toISOString() });
                    addLog(`Registered Tag: ${currentTagSerial}`, 'success');
                } catch(err) { addLog(`Register Error: ${err.message}`, 'error'); }
            };

            const handleTopUp = async () => {
                if (!tagData || !amount) return;
                const val = parseFloat(amount);
                if (isNaN(val) || val <= 0) return addLog('Invalid amount', 'error');
                try {
                    if (isOfflineMode) {
                        setLocalTagsDb(prev => ({ ...prev, [currentTagSerial]: { ...prev[currentTagSerial], balance: prev[currentTagSerial].balance + val } }));
                        addLog(`Topped up $${val.toFixed(2)} (Offline Mode)`, 'success');
                        setAmount('');
                        return;
                    }

                    const tagRef = doc(db, 'artifacts', appId, 'public', 'data', 'tags', currentTagSerial);
                    await updateDoc(tagRef, { balance: tagData.balance + val });
                    addLog(`Topped up $${val.toFixed(2)}`, 'success');
                    setAmount('');
                } catch(err) { addLog(`Top Up Error: ${err.message}`, 'error'); }
            };

            const handlePay = async () => {
                if (!tagData || !amount) return;
                const val = parseFloat(amount);
                if (isNaN(val) || val <= 0) return addLog('Invalid amount', 'error');
                if (tagData.balance < val) return addLog('Insufficient funds!', 'error');
                try {
                    if (isOfflineMode) {
                        setLocalTagsDb(prev => ({ ...prev, [currentTagSerial]: { ...prev[currentTagSerial], balance: prev[currentTagSerial].balance - val } }));
                        addLog(`Charged $${val.toFixed(2)} (Offline Mode)`, 'success');
                        setAmount('');
                        return;
                    }

                    const tagRef = doc(db, 'artifacts', appId, 'public', 'data', 'tags', currentTagSerial);
                    await updateDoc(tagRef, { balance: tagData.balance - val });
                    addLog(`Charged $${val.toFixed(2)}`, 'success');
                    setAmount('');
                } catch(err) { addLog(`Charge Error: ${err.message}`, 'error'); }
            };

            const handleDelete = async () => {
                try {
                    if (isOfflineMode) {
                        const newDb = { ...localTagsDb };
                        delete newDb[currentTagSerial];
                        setLocalTagsDb(newDb);
                        addLog(`Deleted Tag: ${currentTagSerial} (Offline Mode)`, 'success');
                        return;
                    }

                    const tagRef = doc(db, 'artifacts', appId, 'public', 'data', 'tags', currentTagSerial);
                    await deleteDoc(tagRef);
                    addLog(`Deleted Tag: ${currentTagSerial}`, 'success');
                    setTagData(null);
                } catch(err) { addLog(`Delete Error: ${err.message}`, 'error'); }
            };

            const addLog = (msg, type = 'info') => {
                setNfcLog(prev => [{ id: Date.now() + Math.random(), time: new Date().toLocaleTimeString(), msg, type }, ...prev]);
            };

            const startNfcScan = async () => {
                try {
                    if (!('NDEFReader' in window)) {
                        addLog('Web NFC is not supported on this device/browser. Try Chrome on Android.', 'error');
                        return;
                    }
                    const ndef = new NDEFReader();
                    await ndef.scan();
                    setIsScanning(true);
                    addLog('Scanning active. Tap an NFC tag...', 'info');

                    ndef.addEventListener("readingerror", () => {
                        addLog('Error reading NFC tag. Try again.', 'error');
                    });

                    ndef.addEventListener("reading", ({ serialNumber }) => {
                        if (serialNumber) {
                            addLog(`Tag detected! Serial: ${serialNumber}`, 'success');
                            setCurrentTagSerial(serialNumber);
                        } else {
                            addLog('Tag detected but no serial number found. Cannot use for wallet.', 'error');
                        }
                    });
                } catch (error) {
                    addLog(`Scan Error: ${error.message}`, 'error');
                    setIsScanning(false);
                }
            };

            // Success Screen (NFC App Dashboard)
            if (user) {
                return (
                    <div className="min-h-screen bg-slate-100 p-4 sm:p-6 lg:p-8">
                        <div className="max-w-3xl mx-auto space-y-6">
                            {/* Header */}
                            <div className="bg-white rounded-2xl shadow-sm p-6 flex flex-col sm:flex-row items-center justify-between border border-slate-200 relative overflow-hidden">
                                {isOfflineMode && (
                                    <div className="absolute top-0 left-0 w-full bg-amber-500 text-white text-xs text-center py-1 font-bold tracking-widest uppercase">
                                        Offline Demo Mode Active
                                    </div>
                                )}
                                <div className={`flex items-center space-x-4 mb-4 sm:mb-0 ${isOfflineMode ? 'mt-4' : ''}`}>
                                    <div className="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center shadow-md">
                                        <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                                        </svg>
                                    </div>
                                    <div>
                                        <h2 className="text-xl font-bold text-slate-900">NFC Management</h2>
                                        <p className="text-sm text-slate-500">{user.email || email}</p>
                                    </div>
                                </div>
                                <button 
                                    onClick={handleSignOut} 
                                    className="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium rounded-lg transition-colors text-sm"
                                >
                                    Sign Out
                                </button>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                {/* NFC Actions */}
                                <div className="space-y-6">
                                    {/* Reader Card */}
                                    <div className="bg-white rounded-2xl shadow-sm p-6 border border-slate-200">
                                        <h3 className="text-lg font-semibold text-slate-800 mb-4 flex items-center">
                                            <svg className="w-5 h-5 mr-2 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                            </svg>
                                            1. Scan Card
                                        </h3>
                                        <button 
                                            onClick={startNfcScan}
                                            disabled={isScanning}
                                            className={`w-full py-3 px-4 rounded-xl font-medium text-white transition-all shadow-sm ${isScanning ? 'bg-blue-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700'}`}
                                        >
                                            {isScanning ? 'Scanner Active (Tap Tag)' : 'Activate Scanner'}
                                        </button>
                                        
                                        {currentTagSerial && (
                                            <div className="mt-4 p-3 bg-slate-50 border border-slate-200 rounded-lg flex items-center justify-between">
                                                <span className="text-sm text-slate-500 font-mono">ID: {currentTagSerial}</span>
                                                <button onClick={() => setCurrentTagSerial(null)} className="text-xs text-red-500 hover:text-red-700">Clear</button>
                                            </div>
                                        )}
                                    </div>

                                    {/* Wallet Management Card */}
                                    <div className="bg-white rounded-2xl shadow-sm p-6 border border-slate-200">
                                        <h3 className="text-lg font-semibold text-slate-800 mb-4 flex items-center">
                                            <svg className="w-5 h-5 mr-2 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" />
                                            </svg>
                                            2. Tag Wallet
                                        </h3>
                                        
                                        {!currentTagSerial ? (
                                            <p className="text-sm text-slate-500 italic text-center py-4">Scan a tag first to manage its wallet.</p>
                                        ) : !tagData ? (
                                            <div className="space-y-4 text-center py-2">
                                                <p className="text-sm text-amber-600 bg-amber-50 p-3 rounded-lg border border-amber-200">This tag is not registered in the system.</p>
                                                <button 
                                                    onClick={handleRegister}
                                                    className="w-full py-3 px-4 bg-slate-800 hover:bg-slate-900 rounded-xl font-medium text-white transition-all shadow-sm"
                                                >
                                                    Register Tag
                                                </button>
                                            </div>
                                        ) : (
                                            <div className="space-y-4">
                                                <div className="bg-emerald-50 border border-emerald-200 p-4 rounded-xl text-center mb-4">
                                                    <p className="text-sm text-emerald-600 font-medium uppercase tracking-wide">Current Balance</p>
                                                    <p className="text-4xl font-extrabold text-emerald-700">${(tagData.balance || 0).toFixed(2)}</p>
                                                </div>
                                                
                                                <div className="flex space-x-2">
                                                    <div className="relative flex-1">
                                                        <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                                            <span className="text-slate-500 sm:text-sm">$</span>
                                                        </div>
                                                        <input 
                                                            type="number" 
                                                            min="0"
                                                            step="0.01"
                                                            value={amount}
                                                            onChange={(e) => setAmount(e.target.value)}
                                                            placeholder="Amount"
                                                            className="w-full pl-7 pr-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                                                        />
                                                    </div>
                                                </div>

                                                <div className="grid grid-cols-2 gap-3">
                                                    <button 
                                                        onClick={handlePay}
                                                        className="py-2.5 px-4 bg-blue-100 text-blue-700 hover:bg-blue-200 rounded-xl font-semibold transition-all"
                                                    >
                                                        Pay (Deduct)
                                                    </button>
                                                    <button 
                                                        onClick={handleTopUp}
                                                        className="py-2.5 px-4 bg-emerald-100 text-emerald-700 hover:bg-emerald-200 rounded-xl font-semibold transition-all"
                                                    >
                                                        Top Up (Add)
                                                    </button>
                                                </div>
                                                
                                                <div className="pt-4 border-t border-slate-100 mt-2">
                                                    <button 
                                                        onClick={handleDelete}
                                                        className="w-full py-2 px-4 bg-red-50 text-red-600 hover:bg-red-100 rounded-xl font-medium transition-all text-sm"
                                                    >
                                                        Delete Tag & History
                                                    </button>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* Log output */}
                                <div className="bg-slate-900 rounded-2xl shadow-sm p-6 border border-slate-800 flex flex-col h-[500px]">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="text-lg font-semibold text-white flex items-center">
                                            <svg className="w-5 h-5 mr-2 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 10h16M4 14h16M4 18h16" />
                                            </svg>
                                            Activity Log
                                        </h3>
                                        <button onClick={() => setNfcLog([])} className="text-xs text-slate-400 hover:text-white transition-colors">Clear</button>
                                    </div>
                                    <div className="flex-1 overflow-y-auto space-y-2 font-mono text-sm pr-2 custom-scrollbar">
                                        {nfcLog.length === 0 ? (
                                            <p className="text-slate-500 italic">No activity yet. Scan or write to a tag.</p>
                                        ) : (
                                            nfcLog.map((log) => (
                                                <div key={log.id} className="border-b border-slate-800 pb-2">
                                                    <span className="text-slate-500 mr-2">[{log.time}]</span>
                                                    <span className={`${log.type === 'error' ? 'text-red-400' : log.type === 'success' ? 'text-green-400' : 'text-blue-300'}`}>
                                                        {log.msg}
                                                    </span>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            // Login Screen
            return (
                <div className="min-h-screen flex items-center justify-center p-4 sm:p-6 lg:p-8">
                    <div className="max-w-md w-full bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden">
                        <div className="p-8">
                            <div className="text-center mb-8">
                                <div className="mx-auto w-16 h-16 bg-blue-600 rounded-xl flex items-center justify-center mb-4 shadow-lg">
                                    <svg className="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                                    </svg>
                                </div>
                                <h2 className="text-3xl font-extrabold text-slate-900 tracking-tight">Power Studios Portal</h2>
                                <p className="mt-2 text-sm text-slate-500">
                                    Restricted Access — Authorized Personnel Only
                                </p>
                            </div>

                            <form onSubmit={handleSubmit} className="space-y-6">
                                {/* Error Message Box */}
                                {error && (
                                    <div className="bg-red-50 border-l-4 border-red-500 p-4 rounded-md animate-pulse">
                                        <div className="flex items-center">
                                            <svg className="h-5 w-5 text-red-500 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                            </svg>
                                            <p className="text-sm text-red-700">{error}</p>
                                        </div>
                                    </div>
                                )}

                                <div>
                                    <label htmlFor="email" className="block text-sm font-medium text-slate-700">Company Email</label>
                                    <div className="mt-1">
                                        <input
                                            id="email"
                                            name="email"
                                            type="email"
                                            autoComplete="email"
                                            value={email}
                                            onChange={(e) => setEmail(e.target.value)}
                                            className="appearance-none block w-full px-4 py-3 border border-slate-300 rounded-xl shadow-sm placeholder-slate-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm transition-colors"
                                            placeholder="you@eugeneevons.com"
                                        />
                                    </div>
                                </div>

                                <div>
                                    <label htmlFor="password" className="block text-sm font-medium text-slate-700">Password</label>
                                    <div className="mt-1">
                                        <input
                                            id="password"
                                            name="password"
                                            type="password"
                                            autoComplete="current-password"
                                            value={password}
                                            onChange={(e) => setPassword(e.target.value)}
                                            className="appearance-none block w-full px-4 py-3 border border-slate-300 rounded-xl shadow-sm placeholder-slate-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm transition-colors"
                                            placeholder="••••••••"
                                        />
                                    </div>
                                </div>

                                <div className="flex items-center justify-between">
                                    <div className="flex items-center">
                                        <input
                                            id="remember-me"
                                            name="remember-me"
                                            type="checkbox"
                                            className="h-4 w-4 text-blue-600 focus:ring-blue-500 border-slate-300 rounded"
                                        />
                                        <label htmlFor="remember-me" className="ml-2 block text-sm text-slate-900">
                                            Remember me
                                        </label>
                                    </div>

                                    <div className="text-sm">
                                        <a href="#" className="font-medium text-blue-600 hover:text-blue-500 transition-colors">
                                            Forgot your password?
                                        </a>
                                    </div>
                                </div>

                                <div>
                                    <button
                                        type="submit"
                                        disabled={isLoading}
                                        className={`w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-all ${isLoading ? 'opacity-75 cursor-not-allowed' : ''}`}
                                    >
                                        {isLoading ? (
                                            <svg className="animate-spin -ml-1 mr-3 h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
                                                <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                                <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                            </svg>
                                        ) : 'Sign in to Portal'}
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            );
        }

        // Initialize React App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
