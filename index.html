<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power Studios Portal</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel standalone for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 3px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow { animation: spin-slow 8s linear infinite; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased selection:bg-blue-200">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCtbA4ro1ZU429f9HTn29DHjVCpq4t-N-s",
            authDomain: "kisok-a496b.firebaseapp.com",
            projectId: "kisok-a496b",
            storageBucket: "kisok-a496b.firebasestorage.app",
            messagingSenderId: "850722698358",
            appId: "1:850722698358:web:a1603cbb7aafccecebdb57",
            measurementId: "G-E8KG84NDCQ"
        };

        const appId = "kisok-a496b";
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        function App() {
            const [email, setEmail] = useState('default@eugeneevons.com');
            const [password, setPassword] = useState('kiosk1');
            const [error, setError] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [user, setUser] = useState(null);

            // Terminal State
            const [nfcLog, setNfcLog] = useState([]);
            const [isScanning, setIsScanning] = useState(false);
            const [activeAction, setActiveAction] = useState(null); 
            const [amount, setAmount] = useState('');
            const [tipAmount, setTipAmount] = useState(''); 
            const [appliedVoucher, setAppliedVoucher] = useState(0);
            const [customerEmail, setCustomerEmail] = useState('');
            const [membershipDuration, setMembershipDuration] = useState('30');
            const [actionResult, setActionResult] = useState(null); 
            const [topUpMode, setTopUpMode] = useState('NORMAL'); 
            const [registerType, setRegisterType] = useState('CUSTOMER'); // 'CUSTOMER' | 'VOUCHER'
            const [transferState, setTransferState] = useState('AWAITING_SOURCE');
            const [transferData, setTransferData] = useState(null);

            // Slide to Delete State
            const [slideProgress, setSlideProgress] = useState(0);
            const [isDeleteConfirmed, setIsDeleteConfirmed] = useState(false);

            // Action Refs for NFC Listener
            const actionRef = useRef(null);
            const amountRef = useRef(null);
            const tipAmountRef = useRef(null);
            const appliedVoucherRef = useRef(null);
            const customerEmailRef = useRef(null);
            const topUpModeRef = useRef(null);
            const registerTypeRef = useRef(null);
            const transferStateRef = useRef(null);
            const transferDataRef = useRef(null);
            const membershipDurationRef = useRef(null);
            const isDeleteConfirmedRef = useRef(false);

            useEffect(() => {
                actionRef.current = activeAction;
                amountRef.current = amount;
                tipAmountRef.current = tipAmount;
                appliedVoucherRef.current = appliedVoucher;
                customerEmailRef.current = customerEmail;
                topUpModeRef.current = topUpMode;
                registerTypeRef.current = registerType;
                transferStateRef.current = transferState;
                transferDataRef.current = transferData;
                membershipDurationRef.current = membershipDuration;
                isDeleteConfirmedRef.current = isDeleteConfirmed;

                if (!activeAction) {
                    setActionResult(null);
                    setAmount('');
                    setTipAmount('');
                    setAppliedVoucher(0);
                    setCustomerEmail('');
                    setTopUpMode('NORMAL');
                    setRegisterType('CUSTOMER');
                    setTransferState('AWAITING_SOURCE');
                    setTransferData(null);
                    setMembershipDuration('30');
                    setSlideProgress(0);
                    setIsDeleteConfirmed(false);
                }
            }, [activeAction, amount, tipAmount, appliedVoucher, customerEmail, topUpMode, registerType, transferState, transferData, membershipDuration, isDeleteConfirmed]);

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                    if (currentUser) startNfcPersistentScanner();
                });
                return () => unsubscribe();
            }, []);

            const addLog = (msg, type = 'info') => {
                setNfcLog(prev => [{ id: Date.now() + Math.random(), time: new Date().toLocaleTimeString(), msg, type }, ...prev]);
            };

            const startNfcPersistentScanner = async () => {
                try {
                    if (!('NDEFReader' in window)) {
                        addLog('Web NFC not supported.', 'error');
                        return;
                    }
                    const ndef = new NDEFReader();
                    await ndef.scan();
                    setIsScanning(true);
                    addLog('System Online. Select an action.', 'success');

                    ndef.addEventListener("reading", async ({ serialNumber, message }) => {
                        const action = actionRef.current;
                        const currentAmount = parseFloat(amountRef.current);
                        const currentTip = parseFloat(tipAmountRef.current) || 0;
                        const currentVoucher = appliedVoucherRef.current;
                        const currentEmail = customerEmailRef.current;
                        const currentTopUpMode = topUpModeRef.current;
                        const currentRegisterType = registerTypeRef.current;
                        const currentTransferState = transferStateRef.current;
                        const currentTransferData = transferDataRef.current;
                        const currentMemDuration = parseInt(membershipDurationRef.current);
                        const currentDeleteConfirmed = isDeleteConfirmedRef.current;

                        if (!action) return;

                        // Handle Voucher Card Detection for PAY workflow
                        let voucherValue = null;
                        for (const record of message.records) {
                            if (record.recordType === "text") {
                                const decoder = new TextDecoder(record.encoding);
                                const data = decoder.decode(record.data);
                                if (data.toUpperCase().startsWith("VOUCHER:")) {
                                    voucherValue = parseFloat(data.split(":")[1]);
                                }
                            }
                        }

                        if (action === 'PAY' && voucherValue !== null) {
                            setAppliedVoucher(voucherValue);
                            addLog(`Voucher Applied: -$${voucherValue.toFixed(2)}`, 'success');
                            return;
                        }

                        if (action === 'DELETE' && !currentDeleteConfirmed) {
                            addLog("Warning: Slide to confirm deletion first.", "error");
                            return;
                        }

                        setActionResult({ status: 'processing', message: 'Processing NFC Tag...' });

                        try {
                            const tagRef = doc(db, 'artifacts', appId, 'public', 'data', 'tags', serialNumber);
                            
                            switch (action) {
                                case 'BALANCE':
                                    const balSnap = await getDoc(tagRef);
                                    if (balSnap.exists()) {
                                        const bData = balSnap.data();
                                        if (bData.type === 'voucher') {
                                            setActionResult({ status: 'success', type: 'balance', data: { customerEmail: 'Voucher Card', balance: bData.balance, internalId: 'VOUCHER' } });
                                            addLog(`Checked: Voucher Card ($${bData.balance.toFixed(2)})`, 'success');
                                        } else {
                                            setActionResult({ status: 'success', type: 'balance', data: { ...bData, serial: serialNumber } });
                                            addLog(`Checked: ${bData.customerEmail}`, 'success');
                                        }
                                    } else throw new Error("Card not registered.");
                                    break;

                                case 'REGISTER':
                                    if (currentRegisterType === 'CUSTOMER') {
                                        if (!currentEmail) throw new Error("Enter customer email.");
                                        const intId = `PS-${Math.random().toString(36).substr(2, 6).toUpperCase()}`;
                                        await ndef.write({ records: [{ recordType: "text", data: `ID: ${intId}` }, { recordType: "text", data: `Customer: ${currentEmail}` }] });
                                        await setDoc(tagRef, { balance: 0, loanBalance: 0, isMember: false, customerEmail: currentEmail, internalId: intId, registeredAt: new Date().toISOString(), type: 'customer' });
                                        setActionResult({ status: 'success', message: `Registered Customer: ${currentEmail}` });
                                        addLog(`Registered: ${currentEmail}`, 'success');
                                    } else if (currentRegisterType === 'VOUCHER') {
                                        if (isNaN(currentAmount) || currentAmount <= 0) throw new Error("Invalid voucher amount.");
                                        await ndef.write({ records: [{ recordType: "text", data: `VOUCHER:${currentAmount}` }] });
                                        await setDoc(tagRef, { balance: currentAmount, type: 'voucher', created: new Date().toISOString() });
                                        setActionResult({ status: 'success', message: `Created Voucher Card: $${currentAmount.toFixed(2)}` });
                                        addLog(`Created Voucher: $${currentAmount.toFixed(2)}`, 'success');
                                    }
                                    break;

                                case 'TOP_UP':
                                    if (isNaN(currentAmount) || currentAmount <= 0) throw new Error("Invalid amount.");
                                    const topSnap = await getDoc(tagRef);
                                    if (!topSnap.exists()) throw new Error("Card not registered.");
                                    if (topSnap.data().type === 'voucher') throw new Error("Cannot top up a voucher card.");
                                    
                                    const topData = topSnap.data();
                                    const isVipTopUp = topData.isMember && new Date(topData.membershipExpiry) > new Date();
                                    
                                    let depositValue = currentAmount;
                                    let bonusMsg = "";
                                    
                                    if (isVipTopUp) {
                                        depositValue = currentAmount * 1.20;
                                        bonusMsg = `\n(VIP +$${(depositValue - currentAmount).toFixed(2)} Bonus Applied)`;
                                    }
                                    
                                    let b = topData.balance || 0;
                                    let lb = topData.loanBalance || 0;
                                    let topupSuccessMsg = "";

                                    if (currentTopUpMode === 'PAY_LOAN') {
                                        const pay = Math.min(depositValue, lb);
                                        lb -= pay;
                                        b += (depositValue - pay);
                                        topupSuccessMsg = `Paid $${pay.toFixed(2)} to loan. Remaining to credit: $${(depositValue - pay).toFixed(2)}`;
                                    } else {
                                        b += depositValue;
                                        topupSuccessMsg = `Added $${depositValue.toFixed(2)} to credit.`;
                                    }
                                    
                                    await updateDoc(tagRef, { balance: b, loanBalance: lb });
                                    setActionResult({ status: 'success', message: `${topupSuccessMsg} ${bonusMsg}` });
                                    addLog(`Deposit: $${currentAmount.toFixed(2)}${isVipTopUp ? ' + VIP Bonus' : ''}`, 'success');
                                    break;
                                    
                                case 'LOAN':
                                    if (isNaN(currentAmount) || currentAmount <= 0) throw new Error("Invalid amount.");
                                    const loanSnap = await getDoc(tagRef);
                                    if (!loanSnap.exists()) throw new Error("Card not registered.");
                                    if (loanSnap.data().type === 'voucher') throw new Error("Cannot issue loan to voucher.");
                                    
                                    const loanData = loanSnap.data();
                                    const isVipLoan = loanData.isMember && new Date(loanData.membershipExpiry) > new Date();
                                    const loanLimit = isVipLoan ? 15 : 5;
                                    const debt = (loanData.loanBalance || 0) + currentAmount;
                                    
                                    if (debt > loanLimit) throw new Error(`Limit Exceeded. Max loan for this account is $${loanLimit.toFixed(2)}.`);
                                    
                                    await updateDoc(tagRef, { balance: (loanData.balance || 0) + currentAmount, loanBalance: debt });
                                    setActionResult({ status: 'success', message: `Issued $${currentAmount.toFixed(2)} Loan. Total owed: $${debt.toFixed(2)}` });
                                    addLog(`Loan Issued: +$${currentAmount.toFixed(2)}`, 'success');
                                    break;

                                case 'PAY':
                                    if (isNaN(currentAmount) || currentAmount <= 0) throw new Error("Invalid base amount.");
                                    const paySnap = await getDoc(tagRef);
                                    if (!paySnap.exists()) throw new Error("Card not registered.");
                                    if (paySnap.data().type === 'voucher') throw new Error("Please tap a customer card to pay.");
                                    
                                    const payData = paySnap.data();
                                    const isVipPay = payData.isMember && new Date(payData.membershipExpiry) > new Date();
                                    
                                    let baseCharge = currentAmount;
                                    let discountMsg = "";
                                    
                                    if (isVipPay) {
                                        baseCharge = currentAmount * 0.85; 
                                        discountMsg = `\n(VIP 15% Savings: -$${(currentAmount - baseCharge).toFixed(2)})`;
                                    }
                                    
                                    const chargeWithoutTip = Math.max(0, baseCharge - currentVoucher);
                                    const finalCharge = chargeWithoutTip + currentTip;
                                    
                                    if ((payData.balance || 0) < finalCharge) throw new Error(`Insufficient funds. Need $${finalCharge.toFixed(2)}`);
                                    
                                    await updateDoc(tagRef, { balance: payData.balance - finalCharge });
                                    
                                    let payMsg = `Charged $${finalCharge.toFixed(2)}. ${discountMsg}`;
                                    if (currentTip > 0) payMsg += `\n(Includes $${currentTip.toFixed(2)} Tip!)`;
                                    
                                    setActionResult({ status: 'success', message: payMsg });
                                    addLog(`Payment: -$${finalCharge.toFixed(2)} ${currentTip > 0 ? '(+Tip)' : ''}`, 'success');
                                    break;

                                case 'TIP':
                                    if (isNaN(currentAmount) || currentAmount <= 0) throw new Error("Invalid tip amount.");
                                    const tipSnap = await getDoc(tagRef);
                                    if (!tipSnap.exists()) throw new Error("Card not registered.");
                                    if (tipSnap.data().type === 'voucher') throw new Error("Cannot tip from a voucher card.");
                                    
                                    const tipData = tipSnap.data();
                                    if ((tipData.balance || 0) < currentAmount) throw new Error(`Insufficient funds. Customer needs $${currentAmount.toFixed(2)}`);
                                    
                                    await updateDoc(tagRef, { balance: tipData.balance - currentAmount });
                                    setActionResult({ status: 'success', message: `Tip of $${currentAmount.toFixed(2)} processed successfully. Thank you!` });
                                    addLog(`Staff Tip Collected: $${currentAmount.toFixed(2)}`, 'success');
                                    break;

                                case 'MEMBERSHIP':
                                    const mSnap = await getDoc(tagRef);
                                    if (!mSnap.exists()) throw new Error("Card not registered.");
                                    if (mSnap.data().type === 'voucher') throw new Error("Vouchers cannot hold VIP status.");
                                    let exp = mSnap.data().membershipExpiry ? new Date(mSnap.data().membershipExpiry) : new Date();
                                    if (exp < new Date()) exp = new Date();
                                    exp.setDate(exp.getDate() + currentMemDuration);
                                    await updateDoc(tagRef, { isMember: true, membershipExpiry: exp.toISOString() });
                                    setActionResult({ status: 'success', message: `VIP Active until ${exp.toLocaleDateString()}` });
                                    addLog(`Membership +${currentMemDuration} days.`, 'success');
                                    break;

                                case 'TRANSFER':
                                    if (currentTransferState === 'AWAITING_SOURCE') {
                                        const sSnap = await getDoc(tagRef);
                                        if (!sSnap.exists()) throw new Error("Source card not registered.");
                                        await ndef.write({ records: [{ recordType: "text", data: "STATUS: ERASED" }] });
                                        setTransferData({ ...sSnap.data(), oldSerial: serialNumber });
                                        setTransferState('AWAITING_DESTINATION');
                                        setActionResult(null);
                                    } else {
                                        if (serialNumber === currentTransferData.oldSerial) throw new Error("Tap a DIFFERENT card.");
                                        const tid = `PS-${Math.random().toString(36).substr(2, 6).toUpperCase()}`;
                                        await ndef.write({ records: [{ recordType: "text", data: `ID: ${tid}` }, { recordType: "text", data: `Customer: ${currentTransferData.customerEmail}` }] });
                                        await setDoc(tagRef, { ...currentTransferData, internalId: tid });
                                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tags', currentTransferData.oldSerial));
                                        setActionResult({ status: 'success', message: `Transfer Complete!` });
                                    }
                                    break;

                                case 'DELETE':
                                    await deleteDoc(tagRef);
                                    try { await ndef.write({ records: [{ recordType: "text", data: "STATUS: WIPED" }] }); } catch (e) {}
                                    setActionResult({ status: 'success', message: `Record completely wiped.` });
                                    addLog(`Deleted Card: ${serialNumber}`, 'success');
                                    break;
                            }
                        } catch (err) {
                            setActionResult({ status: 'error', message: err.message });
                            addLog(`Error: ${err.message}`, 'error');
                        }
                    });
                } catch (err) { addLog(`NFC Init Error: ${err.message}`, 'error'); }
            };

            // Slider Logic
            const handleSliderChange = (e) => {
                const val = parseInt(e.target.value);
                setSlideProgress(val);
                if (val >= 95) {
                    setIsDeleteConfirmed(true);
                    setSlideProgress(100);
                }
            };

            const handleSliderRelease = () => {
                if (slideProgress < 95) setSlideProgress(0);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                setIsLoading(true);
                try {
                    await signInWithEmailAndPassword(auth, email, password);
                } catch (err) { setError(`Login Failed: ${err.message}`); }
                finally { setIsLoading(false); }
            };

            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-50 p-6">
                        <div className="max-w-md w-full bg-white rounded-[3rem] shadow-2xl p-10 border border-slate-100">
                            <div className="text-center mb-10">
                                <div className="mx-auto w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center shadow-lg mb-6 rotate-3">
                                    <svg className="w-10 h-10 text-white -rotate-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                                </div>
                                <h2 className="text-3xl font-black text-slate-900 tracking-tighter uppercase">Power Studios</h2>
                                <p className="text-[10px] text-slate-400 font-bold uppercase tracking-[0.4em] mt-2">Kiosk Terminal Login</p>
                            </div>
                            <form onSubmit={handleSubmit} className="space-y-4">
                                <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} className="w-full px-6 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold" placeholder="Operator Email"/>
                                <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full px-6 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold" placeholder="Password"/>
                                {error && <p className="text-red-500 text-[10px] font-black uppercase text-center">{error}</p>}
                                <button type="submit" disabled={isLoading} className="w-full py-4 bg-blue-600 text-white rounded-2xl font-black uppercase tracking-widest text-xs hover:bg-blue-700 transition-all active:scale-95">
                                    {isLoading ? 'Verifying...' : 'Unlock Terminal'}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-50 p-4 lg:p-8 font-sans">
                    <div className="max-w-6xl mx-auto space-y-6">
                        {/* Header */}
                        <header className="bg-white rounded-3xl shadow-sm p-6 flex items-center justify-between border border-slate-200">
                            <div className="flex items-center space-x-4">
                                <div className="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center shadow-md"><svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg></div>
                                <div><h1 className="text-xl font-black text-slate-900 tracking-tight">Kiosk Terminal</h1><p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">{user.email}</p></div>
                            </div>
                            <button onClick={() => signOut(auth)} className="text-[10px] font-black text-slate-400 hover:text-red-500 uppercase tracking-widest transition-all">Logout</button>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <div className="lg:col-span-2 space-y-6">
                                {/* Action Selection */}
                                <div className="bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-200">
                                    <h2 className="text-xs font-black text-slate-400 uppercase tracking-[0.3em] mb-8">1. Choose Operation</h2>
                                    <div className="grid grid-cols-2 sm:grid-cols-3 gap-4">
                                        {[
                                            {id: 'REGISTER', label: 'Register', color: 'blue', icon: 'M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z'},
                                            {id: 'BALANCE', label: 'Balance', color: 'slate', icon: 'M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z'},
                                            {id: 'TOP_UP', label: 'Deposit', color: 'emerald', icon: 'M12 6v6m0 0v6m0-6h6m-6 0H6'},
                                            {id: 'PAY', label: 'Sale', color: 'amber', icon: 'M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z'},
                                            {id: 'TIP', label: 'Tip Staff', color: 'teal', icon: 'M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z'},
                                            {id: 'LOAN', label: 'Loan', color: 'purple', icon: 'M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z'},
                                            {id: 'MEMBERSHIP', label: 'VIP', color: 'pink', icon: 'M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z'},
                                            {id: 'TRANSFER', label: 'Transfer', color: 'cyan', icon: 'M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4'},
                                            {id: 'DELETE', label: 'Wipe', color: 'red', icon: 'M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16'}
                                        ].map(btn => (
                                            <button key={btn.id} onClick={() => { setActiveAction(btn.id); setActionResult(null); }} className={`p-4 rounded-2xl border-2 flex flex-col items-center justify-center transition-all ${activeAction === btn.id ? 'border-slate-900 bg-slate-50 ring-4 ring-slate-900/5' : 'border-slate-50 hover:border-slate-200 hover:bg-white'}`}>
                                                <div className={`w-10 h-10 rounded-xl flex items-center justify-center mb-2 ${activeAction === btn.id ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-400'}`}><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d={btn.icon}/></svg></div>
                                                <span className="text-[10px] font-black uppercase tracking-tighter text-slate-900">{btn.label}</span>
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {/* Config & Output */}
                                {activeAction && (
                                    <div className="bg-white rounded-[2.5rem] p-8 shadow-xl border-4 border-slate-900 animate-in fade-in slide-in-from-bottom-4 duration-300">
                                        <div className="flex items-center justify-between mb-8">
                                            <h2 className="text-xs font-black text-slate-400 uppercase tracking-[0.3em]">2. Terminal Config</h2>
                                            {!(activeAction === 'TRANSFER' && transferState === 'AWAITING_DESTINATION') && (
                                                <button onClick={() => setActiveAction(null)} className="text-red-500 font-black text-[10px] uppercase">Cancel</button>
                                            )}
                                        </div>

                                        {actionResult ? (
                                            <div className="space-y-6">
                                                {actionResult.status === 'error' ? (
                                                    <div className="bg-red-50 p-8 rounded-3xl text-center border-2 border-red-200"><p className="text-red-800 font-black uppercase text-xs tracking-widest mb-2">Failed</p><p className="text-red-600 font-bold">{actionResult.message}</p></div>
                                                ) : actionResult.type === 'balance' ? (
                                                    <div className="bg-emerald-50 p-8 rounded-[2rem] text-center border-2 border-emerald-200">
                                                        <p className="text-6xl font-black text-emerald-800 mb-4">${actionResult.data.balance.toFixed(2)}</p>
                                                        <p className="text-xs font-bold text-slate-800">{actionResult.data.customerEmail}</p>
                                                        <div className="mt-4 flex flex-col space-y-2 items-center">
                                                            {(actionResult.data.loanBalance || 0) > 0 && <span className="bg-red-100 px-4 py-2 rounded-xl text-red-600 text-xs font-black border border-red-200 shadow-sm w-full max-w-[240px]">OWES LOAN: ${(actionResult.data.loanBalance).toFixed(2)}</span>}
                                                            {actionResult.data.isMember && new Date(actionResult.data.membershipExpiry) > new Date() && <span className="bg-pink-500 px-4 py-2 rounded-xl text-white text-xs font-black uppercase tracking-tighter shadow-sm w-full max-w-[240px]">VIP Expires: {new Date(actionResult.data.membershipExpiry).toLocaleDateString()}</span>}
                                                        </div>
                                                    </div>
                                                ) : (
                                                    <div className="bg-emerald-50 p-8 rounded-3xl text-center border-2 border-emerald-200">
                                                        <p className="text-emerald-800 font-black uppercase text-xs tracking-widest mb-1">Success</p>
                                                        <p className="text-emerald-600 font-bold whitespace-pre-wrap">{actionResult.message}</p>
                                                    </div>
                                                )}
                                                {actionResult.status !== 'processing' && <button onClick={() => setActionResult(null)} className="w-full py-4 bg-slate-900 text-white rounded-2xl font-black uppercase text-xs tracking-widest">OK</button>}
                                            </div>
                                        ) : (
                                            <div className="space-y-6">
                                                
                                                {/* Registration & Vouchers */}
                                                {activeAction === 'REGISTER' && (
                                                    <div className="space-y-6">
                                                        <div className="flex bg-slate-100 p-1.5 rounded-2xl">
                                                            <button onClick={() => setRegisterType('CUSTOMER')} className={`flex-1 py-3 rounded-xl font-bold text-[10px] uppercase transition-all ${registerType === 'CUSTOMER' ? 'bg-blue-600 shadow-sm text-white' : 'text-slate-400'}`}>Customer Card</button>
                                                            <button onClick={() => setRegisterType('VOUCHER')} className={`flex-1 py-3 rounded-xl font-bold text-[10px] uppercase transition-all ${registerType === 'VOUCHER' ? 'bg-amber-500 shadow-sm text-white' : 'text-slate-400'}`}>Voucher Card</button>
                                                        </div>

                                                        {registerType === 'CUSTOMER' ? (
                                                            <input type="email" value={customerEmail} onChange={(e) => setCustomerEmail(e.target.value)} className="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl px-6 py-5 font-bold outline-none focus:border-blue-500 transition-all" placeholder="customer@email.com" />
                                                        ) : (
                                                            <div className="relative">
                                                                <span className="absolute left-6 top-1/2 -translate-y-1/2 text-2xl font-black text-slate-300">$</span>
                                                                <input type="number" value={amount} onChange={(e) => setAmount(e.target.value)} className="w-full bg-slate-50 border-2 border-slate-100 rounded-3xl pl-12 pr-6 py-6 font-black text-4xl outline-none focus:border-amber-500 transition-all" placeholder="Voucher Value" />
                                                            </div>
                                                        )}
                                                    </div>
                                                )}
                                                
                                                {/* Top Up / Loan / Dedicated Tip */}
                                                {(activeAction === 'TOP_UP' || activeAction === 'LOAN' || activeAction === 'TIP') && (
                                                    <div className="space-y-6">
                                                        {activeAction === 'TOP_UP' && (
                                                            <div className="flex bg-slate-100 p-1.5 rounded-2xl">
                                                                <button onClick={() => setTopUpMode('NORMAL')} className={`flex-1 py-3 rounded-xl font-bold text-[10px] uppercase transition-all ${topUpMode === 'NORMAL' ? 'bg-white shadow-sm text-slate-900' : 'text-slate-400'}`}>Normal Credit</button>
                                                                <button onClick={() => setTopUpMode('PAY_LOAN')} className={`flex-1 py-3 rounded-xl font-bold text-[10px] uppercase transition-all ${topUpMode === 'PAY_LOAN' ? 'bg-indigo-600 shadow-sm text-white' : 'text-slate-400'}`}>Pay Debt Only</button>
                                                            </div>
                                                        )}
                                                        <div className="relative">
                                                            <span className="absolute left-6 top-1/2 -translate-y-1/2 text-2xl font-black text-slate-300">$</span>
                                                            <input type="number" value={amount} onChange={(e) => setAmount(e.target.value)} className={`w-full bg-slate-50 border-2 border-slate-100 rounded-3xl pl-12 pr-6 py-6 font-black text-4xl outline-none transition-all ${activeAction === 'TIP' ? 'focus:border-teal-500' : 'focus:border-blue-500'}`} placeholder="0.00" />
                                                        </div>
                                                        {activeAction === 'TOP_UP' && (
                                                            <p className="text-[10px] font-bold text-slate-400 text-center uppercase tracking-widest">VIPs automatically receive 20% bonus</p>
                                                        )}
                                                        {activeAction === 'TIP' && (
                                                            <p className="text-[10px] font-bold text-teal-500 text-center uppercase tracking-widest">100% goes directly to the staff ❤️</p>
                                                        )}
                                                    </div>
                                                )}

                                                {/* Pay / Vouchers / Inline Tip */}
                                                {activeAction === 'PAY' && (
                                                    <div className="space-y-6">
                                                        <div className="relative">
                                                            <span className="absolute left-6 top-1/2 -translate-y-1/2 text-2xl font-black text-slate-300">$</span>
                                                            <input type="number" value={amount} onChange={(e) => setAmount(e.target.value)} className="w-full bg-slate-50 border-2 border-slate-100 rounded-3xl pl-12 pr-6 py-6 font-black text-4xl outline-none focus:border-amber-500 transition-all" placeholder="Base Sale Amount" />
                                                        </div>
                                                        
                                                        <label className="text-[10px] font-black text-teal-500 uppercase tracking-widest ml-2 block mt-6">Add Tip (Optional)</label>
                                                        <div className="relative">
                                                            <span className="absolute left-6 top-1/2 -translate-y-1/2 text-xl font-black text-teal-300">+$</span>
                                                            <input type="number" value={tipAmount} onChange={(e) => setTipAmount(e.target.value)} className="w-full bg-teal-50/30 border-2 border-teal-100 rounded-2xl pl-12 pr-6 py-4 font-bold text-2xl text-teal-800 outline-none focus:border-teal-500 transition-all shadow-inner" placeholder="0.00" />
                                                        </div>

                                                        <div className="bg-emerald-50 border-2 border-dashed border-emerald-100 p-5 rounded-3xl flex justify-between items-center">
                                                            <div>
                                                                <p className="text-[10px] font-black text-emerald-600 uppercase tracking-widest">Active Voucher</p>
                                                                <p className="text-2xl font-black text-emerald-800">-${appliedVoucher.toFixed(2)}</p>
                                                            </div>
                                                            <div className="text-[10px] text-emerald-500 font-bold max-w-[120px] text-right leading-tight">Tap a Voucher Card at any time to subtract.</div>
                                                        </div>
                                                        
                                                        {amount && (
                                                            <div className="text-right mt-2 pr-2">
                                                                <span className="text-xs font-bold text-slate-500 uppercase tracking-widest mr-2">Est. Final Charge: </span>
                                                                <span className="text-slate-900 font-black text-2xl">
                                                                    ${(Math.max(0, parseFloat(amount) - (parseFloat(appliedVoucher) || 0)) + (parseFloat(tipAmount) || 0)).toFixed(2)}
                                                                </span>
                                                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">15% discount auto-applied for VIPs</p>
                                                            </div>
                                                        )}
                                                    </div>
                                                )}

                                                {/* Membership */}
                                                {activeAction === 'MEMBERSHIP' && (
                                                    <div className="space-y-4">
                                                        <div className="grid grid-cols-3 gap-3">
                                                            {[
                                                                { days: 30, price: 3 },
                                                                { days: 90, price: 9 },
                                                                { days: 365, price: 36 }
                                                            ].map(plan => (
                                                                <button key={plan.days} onClick={() => setMembershipDuration(plan.days.toString())} className={`py-4 rounded-2xl flex flex-col items-center justify-center transition-all ${membershipDuration === plan.days.toString() ? 'bg-pink-500 text-white shadow-md' : 'bg-slate-100 text-slate-400 hover:bg-slate-200'}`}>
                                                                    <span className="font-black text-xs uppercase tracking-tight">{plan.days} Days</span>
                                                                    <span className={`text-[10px] font-bold mt-1 ${membershipDuration === plan.days.toString() ? 'text-pink-200' : 'text-slate-400'}`}>${plan.price}</span>
                                                                </button>
                                                            ))}
                                                        </div>
                                                        <p className="text-[10px] text-center font-bold text-slate-400 uppercase tracking-widest">Collect payment via POS before tapping</p>
                                                    </div>
                                                )}

                                                {/* Slide to Delete */}
                                                {activeAction === 'DELETE' && (
                                                    <div className="space-y-6">
                                                        <div className="bg-red-50 p-6 rounded-3xl border-2 border-dashed border-red-200 text-center">
                                                            <p className="text-red-700 font-black uppercase text-xs tracking-widest mb-2">Destructive Action</p>
                                                            <p className="text-[10px] text-red-500 font-bold">Slide fully to unlock physical card wipe.</p>
                                                        </div>
                                                        
                                                        <div className="relative bg-slate-100 h-16 rounded-3xl overflow-hidden shadow-inner group">
                                                            <div 
                                                                className="absolute inset-y-0 left-0 bg-red-600 flex items-center justify-end pr-4 transition-all"
                                                                style={{ width: `${Math.max(15, slideProgress)}%` }}
                                                            >
                                                                {slideProgress > 20 && <svg className="w-6 h-6 text-white animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="4" d="M13 5l7 7-7 7M5 5l7 7-7 7"/></svg>}
                                                            </div>
                                                            
                                                            <input 
                                                                type="range" 
                                                                min="0" 
                                                                max="100" 
                                                                value={slideProgress} 
                                                                onChange={handleSliderChange}
                                                                onMouseUp={handleSliderRelease}
                                                                onTouchEnd={handleSliderRelease}
                                                                disabled={isDeleteConfirmed}
                                                                className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10"
                                                            />
                                                            
                                                            <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                                                                <span className={`text-[10px] font-black uppercase tracking-[0.2em] transition-opacity ${slideProgress > 50 ? 'opacity-0' : 'text-slate-400'}`}>
                                                                    {isDeleteConfirmed ? 'SYSTEM ARMED' : 'Slide to Confirm Wipe'}
                                                                </span>
                                                            </div>
                                                        </div>
                                                    </div>
                                                )}

                                                {/* Transfer Setup */}
                                                {activeAction === 'TRANSFER' && (
                                                    <div className="p-6 bg-cyan-50 border-2 border-dashed border-cyan-200 rounded-3xl text-center">
                                                        <p className="font-black text-cyan-800 uppercase text-xs">{transferState === 'AWAITING_SOURCE' ? '1. Erase Source' : '2. Write Target'}</p>
                                                        <p className="text-[10px] text-cyan-600 mt-2 font-bold">{transferState === 'AWAITING_SOURCE' ? 'Tap CURRENT card.' : 'Tap NEW card.'}</p>
                                                    </div>
                                                )}

                                                {/* Scanner Prompt */}
                                                {(activeAction !== 'DELETE' || isDeleteConfirmed) && (
                                                    <div className={`mt-8 p-6 rounded-[2rem] text-white flex items-center justify-between shadow-2xl ring-4 ${activeAction === 'DELETE' ? 'bg-red-600 ring-red-600/20' : 'bg-slate-900 ring-slate-900/10'}`}>
                                                        <div className="flex items-center space-x-4">
                                                            <div className="w-10 h-10 rounded-full border-2 border-dashed border-white/30 flex items-center justify-center animate-spin-slow"><svg className="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg></div>
                                                            <div>
                                                                <p className="font-black uppercase text-[10px] tracking-widest text-white/50">{activeAction === 'DELETE' ? 'ARMED & READY' : 'Scanner Active'}</p>
                                                                <p className="text-xs font-bold uppercase">{activeAction === 'PAY' ? 'Tap Card / Voucher' : 'Tap Physical Card'}</p>
                                                            </div>
                                                        </div>
                                                        <div className={`h-2 w-2 rounded-full animate-pulse ${activeAction === 'DELETE' ? 'bg-white' : 'bg-emerald-400'}`}></div>
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>

                            {/* Logs */}
                            <div className="bg-slate-900 rounded-[2.5rem] shadow-2xl p-8 border border-slate-800 flex flex-col h-[600px] lg:h-auto overflow-hidden">
                                <h3 className="text-xs font-black text-slate-500 uppercase tracking-[0.3em] mb-8">Activity Feed</h3>
                                <div className="flex-1 overflow-y-auto space-y-6 pr-2 custom-scrollbar">
                                    {nfcLog.map((log) => (
                                        <div key={log.id} className="group relative">
                                            <div className="flex items-center space-x-3 mb-2"><span className="text-slate-600 font-mono text-[10px]">{log.time}</span><div className="h-[1px] flex-1 bg-slate-800"></div><span className={`px-2 py-0.5 rounded-sm text-[8px] font-black uppercase tracking-tighter ${log.type === 'error' ? 'bg-red-500 text-white' : log.type === 'success' ? 'bg-emerald-500 text-white' : 'bg-blue-600 text-white'}`}>{log.type}</span></div>
                                            <p className="text-slate-200 text-xs font-semibold pl-4 border-l border-slate-800 break-words leading-relaxed">{log.msg}</p>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => setNfcLog([])} className="mt-6 py-2 text-[10px] font-black uppercase tracking-widest text-slate-600 hover:text-white transition-all border-t border-slate-800 pt-6">Clear History</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
