<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power Studios Portal</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel standalone for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 antialiased selection:bg-blue-200">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCtbA4ro1ZU429f9HTn29DHjVCpq4t-N-s",
            authDomain: "kisok-a496b.firebaseapp.com",
            projectId: "kisok-a496b",
            storageBucket: "kisok-a496b.firebasestorage.app",
            messagingSenderId: "850722698358",
            appId: "1:850722698358:web:a1603cbb7aafccecebdb57",
            measurementId: "G-E8KG84NDCQ"
        };

        const appId = "kisok-a496b";
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        function App() {
            const [email, setEmail] = useState('default@eugeneevons.com');
            const [password, setPassword] = useState('kiosk1');
            const [error, setError] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [user, setUser] = useState(null);

            // App State
            const [nfcLog, setNfcLog] = useState([]);
            const [isScanning, setIsScanning] = useState(false);
            
            // Workflow State
            const [activeAction, setActiveAction] = useState(null); // 'REGISTER' | 'PAY' | 'TOP_UP' | 'DELETE' | 'BALANCE'
            const [amount, setAmount] = useState('');
            const [customerEmail, setCustomerEmail] = useState('');

            // Refs for NFC Event Listener
            const actionRef = useRef(null);
            const amountRef = useRef(null);
            const customerEmailRef = useRef(null);

            useEffect(() => {
                actionRef.current = activeAction;
                amountRef.current = amount;
                customerEmailRef.current = customerEmail;
            }, [activeAction, amount, customerEmail]);

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                    if (currentUser) startNfcPersistentScanner();
                });
                return () => unsubscribe();
            }, []);

            const addLog = (msg, type = 'info') => {
                setNfcLog(prev => [{ id: Date.now() + Math.random(), time: new Date().toLocaleTimeString(), msg, type }, ...prev]);
            };

            const startNfcPersistentScanner = async () => {
                try {
                    if (!('NDEFReader' in window)) {
                        addLog('Web NFC not supported.', 'error');
                        return;
                    }
                    const ndef = new NDEFReader();
                    await ndef.scan();
                    setIsScanning(true);
                    addLog('System Online. Select an action below.', 'success');

                    ndef.addEventListener("reading", async ({ serialNumber, message }) => {
                        const action = actionRef.current;
                        const currentAmount = parseFloat(amountRef.current);
                        const currentEmail = customerEmailRef.current;

                        if (!action) {
                            addLog(`Card Tapped (${serialNumber}). Select an action first.`, 'info');
                            return;
                        }

                        try {
                            const tagRef = doc(db, 'artifacts', appId, 'public', 'data', 'tags', serialNumber);
                            
                            switch (action) {
                                case 'BALANCE':
                                    const balSnap = await getDoc(tagRef);
                                    if (balSnap.exists()) {
                                        const data = balSnap.data();
                                        addLog(`[BALANCE] ID: ${serialNumber} | Customer: ${data.customerEmail} | Credit: $${data.balance.toFixed(2)}`, 'success');
                                    } else {
                                        addLog(`Card ${serialNumber} is not registered.`, 'error');
                                    }
                                    break;

                                case 'REGISTER':
                                    if (!currentEmail) throw new Error("Missing customer email.");
                                    const internalId = `PS-${Math.random().toString(36).substr(2, 6).toUpperCase()}`;
                                    
                                    // Write to physical card
                                    await ndef.write({
                                        records: [
                                            { recordType: "text", data: `ID: ${internalId}` },
                                            { recordType: "text", data: `Customer: ${currentEmail}` }
                                        ]
                                    });
                                    
                                    // Write to Firestore
                                    await setDoc(tagRef, {
                                        balance: 0,
                                        customerEmail: currentEmail,
                                        internalId: internalId,
                                        registeredAt: new Date().toISOString()
                                    });
                                    addLog(`Registered & Linked: ${currentEmail}`, 'success');
                                    setCustomerEmail('');
                                    setActiveAction(null);
                                    break;

                                case 'TOP_UP':
                                    if (isNaN(currentAmount) || currentAmount <= 0) throw new Error("Invalid amount.");
                                    const topSnap = await getDoc(tagRef);
                                    if (!topSnap.exists()) throw new Error("Card not registered.");
                                    await updateDoc(tagRef, { balance: topSnap.data().balance + currentAmount });
                                    addLog(`Deposit Success: +$${currentAmount.toFixed(2)} to ${topSnap.data().customerEmail}`, 'success');
                                    setAmount('');
                                    setActiveAction(null);
                                    break;

                                case 'PAY':
                                    if (isNaN(currentAmount) || currentAmount <= 0) throw new Error("Invalid amount.");
                                    const paySnap = await getDoc(tagRef);
                                    if (!paySnap.exists()) throw new Error("Card not registered.");
                                    const balance = paySnap.data().balance;
                                    if (balance < currentAmount) throw new Error("Insufficient funds.");
                                    await updateDoc(tagRef, { balance: balance - currentAmount });
                                    addLog(`Payment Success: -$${currentAmount.toFixed(2)} from ${paySnap.data().customerEmail}`, 'success');
                                    setAmount('');
                                    setActiveAction(null);
                                    break;

                                case 'DELETE':
                                    await deleteDoc(tagRef);
                                    addLog(`Record wiped for card ${serialNumber}`, 'success');
                                    setActiveAction(null);
                                    break;
                            }
                        } catch (err) {
                            addLog(`Error: ${err.message}`, 'error');
                        }
                    });
                } catch (error) {
                    addLog(`NFC Setup Error: ${error.message}`, 'error');
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                setIsLoading(true);
                try {
                    await signInWithEmailAndPassword(auth, email, password);
                } catch (err) {
                    setError(`Auth Failed: ${err.message}`);
                } finally {
                    setIsLoading(false);
                }
            };

            if (user) {
                return (
                    <div className="min-h-screen bg-slate-50 p-4 lg:p-8">
                        <div className="max-w-5xl mx-auto space-y-6">
                            {/* App Header */}
                            <header className="bg-white rounded-3xl shadow-sm p-6 flex items-center justify-between border border-slate-200">
                                <div className="flex items-center space-x-4">
                                    <div className="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg rotate-3">
                                        <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                                    </div>
                                    <div>
                                        <h1 className="text-xl font-black text-slate-900 tracking-tight">Power Studios Terminal</h1>
                                        <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">{user.email}</p>
                                    </div>
                                </div>
                                <button onClick={() => signOut(auth)} className="text-[10px] font-black text-slate-400 hover:text-red-500 uppercase tracking-[0.2em] transition-all">Sign Out</button>
                            </header>

                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                {/* Left Column: Selection */}
                                <div className="lg:col-span-2 space-y-6">
                                    <div className="bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-200">
                                        <h2 className="text-xs font-black text-slate-400 uppercase tracking-[0.3em] mb-8">1. Select Operation</h2>
                                        
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                            {/* Register Option */}
                                            <button 
                                                onClick={() => setActiveAction('REGISTER')}
                                                className={`p-6 rounded-3xl border-2 text-left transition-all group ${activeAction === 'REGISTER' ? 'border-blue-600 bg-blue-50/50 ring-4 ring-blue-600/5' : 'border-slate-100 hover:border-slate-200'}`}
                                            >
                                                <div className={`w-10 h-10 rounded-xl flex items-center justify-center mb-4 transition-colors ${activeAction === 'REGISTER' ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-400'}`}>
                                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>
                                                </div>
                                                <h3 className="font-black text-slate-900 uppercase text-sm mb-1 tracking-tight">New Customer</h3>
                                                <p className="text-xs text-slate-400 font-medium">Link a new card to a personal email.</p>
                                            </button>

                                            {/* Balance Option */}
                                            <button 
                                                onClick={() => setActiveAction('BALANCE')}
                                                className={`p-6 rounded-3xl border-2 text-left transition-all group ${activeAction === 'BALANCE' ? 'border-slate-900 bg-slate-900 text-white' : 'border-slate-100 hover:border-slate-200'}`}
                                            >
                                                <div className={`w-10 h-10 rounded-xl flex items-center justify-center mb-4 transition-colors ${activeAction === 'BALANCE' ? 'bg-white text-slate-900 shadow-sm' : 'bg-slate-100 text-slate-400'}`}>
                                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                                                </div>
                                                <h3 className={`font-black uppercase text-sm mb-1 tracking-tight ${activeAction === 'BALANCE' ? 'text-white' : 'text-slate-900'}`}>Check Balance</h3>
                                                <p className={`text-xs font-medium ${activeAction === 'BALANCE' ? 'text-slate-400' : 'text-slate-400'}`}>Quickly verify customer credit.</p>
                                            </button>

                                            {/* Top Up Option */}
                                            <button 
                                                onClick={() => setActiveAction('TOP_UP')}
                                                className={`p-6 rounded-3xl border-2 text-left transition-all group ${activeAction === 'TOP_UP' ? 'border-emerald-600 bg-emerald-50/50 ring-4 ring-emerald-600/5' : 'border-slate-100 hover:border-slate-200'}`}
                                            >
                                                <div className={`w-10 h-10 rounded-xl flex items-center justify-center mb-4 transition-colors ${activeAction === 'TOP_UP' ? 'bg-emerald-600 text-white' : 'bg-slate-100 text-slate-400'}`}>
                                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>
                                                </div>
                                                <h3 className="font-black text-slate-900 uppercase text-sm mb-1 tracking-tight">Add Credits</h3>
                                                <p className="text-xs text-slate-400 font-medium">Deposit funds into a registered card.</p>
                                            </button>

                                            {/* Pay Option */}
                                            <button 
                                                onClick={() => setActiveAction('PAY')}
                                                className={`p-6 rounded-3xl border-2 text-left transition-all group ${activeAction === 'PAY' ? 'border-amber-600 bg-amber-50/50 ring-4 ring-amber-600/5' : 'border-slate-100 hover:border-slate-200'}`}
                                            >
                                                <div className={`w-10 h-10 rounded-xl flex items-center justify-center mb-4 transition-colors ${activeAction === 'PAY' ? 'bg-amber-600 text-white' : 'bg-slate-100 text-slate-400'}`}>
                                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
                                                </div>
                                                <h3 className="font-black text-slate-900 uppercase text-sm mb-1 tracking-tight">Kiosk Sale</h3>
                                                <p className="text-xs text-slate-400 font-medium">Charge a card for services or products.</p>
                                            </button>
                                        </div>
                                    </div>

                                    {/* Action Configuration */}
                                    {activeAction && (
                                        <div className="bg-white rounded-[2.5rem] p-8 shadow-xl border-4 border-slate-900 animate-in fade-in slide-in-from-bottom-4 duration-300">
                                            <div className="flex items-center justify-between mb-8">
                                                <h2 className="text-xs font-black text-slate-400 uppercase tracking-[0.3em]">2. Configuration</h2>
                                                <button onClick={() => setActiveAction(null)} className="text-red-500 font-black text-[10px] uppercase">Cancel Action</button>
                                            </div>

                                            {activeAction === 'REGISTER' && (
                                                <div className="space-y-4">
                                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Customer Personal Email</label>
                                                    <input 
                                                        type="email" 
                                                        value={customerEmail}
                                                        onChange={(e) => setCustomerEmail(e.target.value)}
                                                        className="w-full bg-slate-50 border border-slate-200 rounded-2xl px-6 py-5 font-bold text-slate-900 outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all"
                                                        placeholder="customer@email.com"
                                                    />
                                                </div>
                                            )}

                                            {(activeAction === 'TOP_UP' || activeAction === 'PAY') && (
                                                <div className="space-y-4">
                                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Transaction Amount</label>
                                                    <div className="relative">
                                                        <span className="absolute left-6 top-1/2 -translate-y-1/2 text-3xl font-black text-slate-300">$</span>
                                                        <input 
                                                            type="number" 
                                                            value={amount}
                                                            onChange={(e) => setAmount(e.target.value)}
                                                            className="w-full bg-slate-50 border border-slate-200 rounded-2xl pl-12 pr-6 py-6 font-black text-4xl text-slate-800 outline-none focus:border-slate-900 transition-all"
                                                            placeholder="0.00"
                                                        />
                                                    </div>
                                                </div>
                                            )}

                                            {activeAction === 'BALANCE' && (
                                                <div className="py-10 text-center">
                                                    <div className="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4 animate-pulse">
                                                        <svg className="w-10 h-10 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                                                    </div>
                                                    <p className="font-black text-slate-900 uppercase tracking-tight">Ready to Check Balance</p>
                                                    <p className="text-sm text-slate-400 mt-2 italic">Tap any customer card to view details.</p>
                                                </div>
                                            )}

                                            {activeAction !== 'BALANCE' && (
                                                <div className="mt-10 p-6 bg-slate-900 rounded-3xl text-white flex items-center justify-between">
                                                    <div className="flex items-center space-x-4">
                                                        <div className="w-12 h-12 rounded-full border-2 border-dashed border-white/30 flex items-center justify-center animate-spin-slow">
                                                            <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
                                                        </div>
                                                        <p className="font-black uppercase text-xs tracking-widest">Awaiting Physical Card Tap</p>
                                                    </div>
                                                    <div className="text-right">
                                                        <p className="text-[10px] font-black text-white/50 uppercase tracking-widest">Status</p>
                                                        <p className="text-sm font-bold text-emerald-400 uppercase tracking-tighter">Scanner Ready</p>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>

                                {/* Right Column: Logs */}
                                <div className="bg-slate-900 rounded-[2.5rem] shadow-2xl p-8 border border-slate-800 flex flex-col h-[600px] lg:h-auto">
                                    <div className="flex justify-between items-center mb-8">
                                        <h3 className="text-xs font-black text-slate-500 uppercase tracking-[0.3em]">Activity Stream</h3>
                                        <button onClick={() => setNfcLog([])} className="text-[9px] bg-slate-800 px-4 py-1.5 rounded-full text-slate-400 font-black uppercase tracking-widest transition-colors hover:text-white">Clear</button>
                                    </div>
                                    <div className="flex-1 overflow-y-auto space-y-6 pr-2 custom-scrollbar">
                                        {nfcLog.length === 0 ? (
                                            <div className="flex flex-col items-center justify-center h-full opacity-10">
                                                <svg className="w-16 h-16 mb-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16m-7 6h7"/></svg>
                                                <p className="text-white font-black text-[10px] uppercase tracking-widest">No Recent Activity</p>
                                            </div>
                                        ) : (
                                            nfcLog.map((log) => (
                                                <div key={log.id} className="group relative">
                                                    <div className="flex items-center space-x-3 mb-2">
                                                        <span className="text-slate-600 font-mono text-[10px]">{log.time}</span>
                                                        <div className="h-[1px] flex-1 bg-slate-800"></div>
                                                        <span className={`px-2 py-0.5 rounded-sm text-[8px] font-black uppercase tracking-tighter ${log.type === 'error' ? 'bg-red-500 text-white' : log.type === 'success' ? 'bg-emerald-500 text-white' : 'bg-blue-600 text-white'}`}>
                                                            {log.type}
                                                        </span>
                                                    </div>
                                                    <p className="text-slate-200 text-xs font-semibold pl-4 border-l border-slate-800 group-hover:border-slate-600 transition-all break-words leading-relaxed">{log.msg}</p>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            // Login Screen
            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="max-w-md w-full bg-white rounded-[3rem] shadow-2xl p-10 lg:p-14 border border-slate-100 overflow-hidden relative">
                        <div className="text-center mb-14 relative z-10">
                            <div className="mx-auto w-24 h-24 bg-blue-600 rounded-[2rem] flex items-center justify-center mb-8 shadow-xl rotate-3">
                                <svg className="w-12 h-12 text-white -rotate-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3.5" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                            </div>
                            <h2 className="text-4xl font-black text-slate-900 tracking-tighter">Power Studios</h2>
                            <p className="text-[10px] text-slate-400 font-black uppercase tracking-[0.4em] mt-4">Authorized Kiosk Login</p>
                        </div>
                        <form onSubmit={handleSubmit} className="space-y-6 relative z-10">
                            {error && <div className="bg-red-50 border-2 border-red-100 p-4 rounded-2xl text-[10px] text-red-700 font-black uppercase tracking-tight">{error}</div>}
                            <div className="space-y-4">
                                <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} className="block w-full px-7 py-5 bg-slate-50 border-2 border-slate-100 rounded-3xl focus:border-blue-500 focus:bg-white focus:outline-none transition-all text-sm font-bold" placeholder="Kiosk Operator Email"/>
                                <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} className="block w-full px-7 py-5 bg-slate-50 border-2 border-slate-100 rounded-3xl focus:border-blue-500 focus:bg-white focus:outline-none transition-all text-sm font-bold" placeholder="Access Password"/>
                            </div>
                            <button type="submit" disabled={isLoading} className="w-full py-5 rounded-3xl shadow-xl shadow-blue-600/20 text-xs font-black text-white bg-blue-600 hover:bg-blue-700 transform transition-all active:scale-95 flex items-center justify-center uppercase tracking-[0.2em]">
                                {isLoading ? 'Verifying...' : 'Launch Terminal'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 3px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow { animation: spin-slow 8s linear infinite; }
    </style>
</body>
</html>
