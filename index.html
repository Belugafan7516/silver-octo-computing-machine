<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power Studios Portal</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel standalone for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 antialiased selection:bg-blue-200">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCtbA4ro1ZU429f9HTn29DHjVCpq4t-N-s",
            authDomain: "kisok-a496b.firebaseapp.com",
            projectId: "kisok-a496b",
            storageBucket: "kisok-a496b.firebasestorage.app",
            messagingSenderId: "850722698358",
            appId: "1:850722698358:web:a1603cbb7aafccecebdb57",
            measurementId: "G-E8KG84NDCQ"
        };

        const appId = "kisok-a496b";
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        function App() {
            const [email, setEmail] = useState('default@eugeneevons.com');
            const [password, setPassword] = useState('kiosk1');
            const [error, setError] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [user, setUser] = useState(null);

            // NFC & Wallet States
            const [nfcLog, setNfcLog] = useState([]);
            const [isScanning, setIsScanning] = useState(false);
            const [currentTagSerial, setCurrentTagSerial] = useState(null);
            const [tagData, setTagData] = useState(null);
            
            // Inputs
            const [amount, setAmount] = useState('');
            const [ownerEmail, setOwnerEmail] = useState('');

            // Confirmation State (The "Re-tap" Logic)
            const [pendingAction, setPendingAction] = useState(null); 
            // { type: 'REGISTER' | 'TOP_UP' | 'PAY' | 'DELETE', value: any }

            // Ref to keep track of currentTagSerial for the NDEF event listener
            const serialRef = useRef(null);
            const pendingRef = useRef(null);

            useEffect(() => {
                serialRef.current = currentTagSerial;
                pendingRef.current = pendingAction;
            }, [currentTagSerial, pendingAction]);

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user || !currentTagSerial || !db) return;
                const tagRef = doc(db, 'artifacts', appId, 'public', 'data', 'tags', currentTagSerial);
                const unsubscribe = onSnapshot(tagRef, (docSnap) => {
                    setTagData(docSnap.exists() ? docSnap.data() : null);
                }, (err) => {
                    addLog(`Firestore Error: ${err.message}`, 'error');
                });
                return () => unsubscribe();
            }, [user, currentTagSerial]);

            const addLog = (msg, type = 'info') => {
                setNfcLog(prev => [{ id: Date.now() + Math.random(), time: new Date().toLocaleTimeString(), msg, type }, ...prev]);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                setIsLoading(true);
                try {
                    await signInWithEmailAndPassword(auth, email, password);
                } catch (err) {
                    setError(`Login failed: ${err.message}`);
                } finally {
                    setIsLoading(false);
                }
            };

            const startNfcScan = async () => {
                try {
                    if (!('NDEFReader' in window)) {
                        addLog('Web NFC not supported.', 'error');
                        return;
                    }
                    const ndef = new NDEFReader();
                    await ndef.scan();
                    setIsScanning(true);
                    addLog('Scanner Active. Tap your tag to identify or confirm action.', 'info');

                    ndef.addEventListener("reading", async ({ serialNumber, message }) => {
                        const activeSerial = serialRef.current;
                        const action = pendingRef.current;

                        // 1. If we are waiting for a RE-TAP to confirm an action
                        if (action) {
                            if (serialNumber !== activeSerial && action.type !== 'REGISTER') {
                                addLog(`Wrong card! Expected ${activeSerial}, got ${serialNumber}`, 'error');
                                return;
                            }

                            try {
                                await executePendingAction(serialNumber, action, ndef);
                                setPendingAction(null);
                            } catch (err) {
                                addLog(`Action failed: ${err.message}`, 'error');
                            }
                            return;
                        }

                        // 2. Otherwise, this is a standard identification tap
                        setCurrentTagSerial(serialNumber);
                        addLog(`Tag detected: ${serialNumber}`, 'success');
                        
                        // Parse existing records if any
                        for (const record of message.records) {
                            if (record.recordType === "text") {
                                const textDecoder = new TextDecoder(record.encoding);
                                const data = textDecoder.decode(record.data);
                                if (data.includes("Owner:")) addLog(`Card Record: ${data}`, 'info');
                            }
                        }
                    });
                } catch (error) {
                    addLog(`NFC Error: ${error.message}`, 'error');
                    setIsScanning(false);
                }
            };

            const executePendingAction = async (serial, action, ndef) => {
                const tagRef = doc(db, 'artifacts', appId, 'public', 'data', 'tags', serial);

                switch (action.type) {
                    case 'REGISTER':
                        const internalId = `PS-${Math.random().toString(36).substr(2, 9).toUpperCase()}`;
                        // Physically write to the card
                        await ndef.write({
                            records: [
                                { recordType: "text", data: `ID: ${internalId}` },
                                { recordType: "text", data: `Owner: ${action.email}` }
                            ]
                        });
                        // Save to Firestore
                        await setDoc(tagRef, { 
                            balance: 0, 
                            ownerEmail: action.email,
                            internalId: internalId,
                            registeredAt: new Date().toISOString()
                        });
                        addLog(`Successfully Registered & Written to Tag!`, 'success');
                        setOwnerEmail('');
                        break;

                    case 'TOP_UP':
                        await updateDoc(tagRef, { balance: tagData.balance + action.amount });
                        addLog(`Confirmed: Added $${action.amount.toFixed(2)}`, 'success');
                        setAmount('');
                        break;

                    case 'PAY':
                        await updateDoc(tagRef, { balance: tagData.balance - action.amount });
                        addLog(`Confirmed: Charged $${action.amount.toFixed(2)}`, 'success');
                        setAmount('');
                        break;

                    case 'DELETE':
                        await deleteDoc(tagRef);
                        addLog(`Confirmed: Tag data wiped.`, 'success');
                        setCurrentTagSerial(null);
                        setTagData(null);
                        break;
                }
            };

            // UI Triggers for Pending Actions
            const initiateRegister = () => {
                if (!ownerEmail) return addLog('Owner email required.', 'error');
                setPendingAction({ type: 'REGISTER', email: ownerEmail });
                addLog('PENDING: Re-tap the card to WRITE owner data and REGISTER.', 'info');
            };

            const initiateTopUp = () => {
                const val = parseFloat(amount);
                if (isNaN(val) || val <= 0) return addLog('Invalid amount.', 'error');
                setPendingAction({ type: 'TOP_UP', amount: val });
                addLog(`PENDING: Re-tap card to ADD $${val.toFixed(2)}.`, 'info');
            };

            const initiatePay = () => {
                const val = parseFloat(amount);
                if (isNaN(val) || val <= 0) return addLog('Invalid amount.', 'error');
                if (tagData.balance < val) return addLog('Insufficient funds.', 'error');
                setPendingAction({ type: 'PAY', amount: val });
                addLog(`PENDING: Re-tap card to DEDUCT $${val.toFixed(2)}.`, 'info');
            };

            const initiateDelete = () => {
                setPendingAction({ type: 'DELETE' });
                addLog('PENDING: Re-tap card to PERMANENTLY DELETE from system.', 'error');
            };

            if (user) {
                return (
                    <div className="min-h-screen bg-slate-100 p-4 lg:p-8">
                        <div className="max-w-4xl mx-auto space-y-6">
                            {/* Header */}
                            <div className="bg-white rounded-3xl shadow-sm p-6 flex items-center justify-between border border-slate-200">
                                <div className="flex items-center space-x-4">
                                    <div className="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg">
                                        <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                                    </div>
                                    <div>
                                        <h2 className="text-xl font-black text-slate-900">Power Studios</h2>
                                        <p className="text-xs text-slate-400 font-mono">{user.email}</p>
                                    </div>
                                </div>
                                <button onClick={() => signOut(auth)} className="text-xs font-bold text-slate-400 hover:text-red-500 uppercase tracking-widest transition-colors">Sign Out</button>
                            </div>

                            {/* Status Banner for Pending Actions */}
                            {pendingAction && (
                                <div className="bg-blue-600 text-white p-4 rounded-2xl shadow-xl flex items-center justify-between animate-pulse">
                                    <div className="flex items-center space-x-3">
                                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                        <div>
                                            <p className="font-black uppercase text-xs tracking-tighter">Action Required</p>
                                            <p className="text-sm font-medium">Re-tap card to confirm {pendingAction.type.replace('_',' ')}</p>
                                        </div>
                                    </div>
                                    <button onClick={() => setPendingAction(null)} className="text-xs bg-white/20 px-3 py-1 rounded-full font-bold">Cancel</button>
                                </div>
                            )}

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className="space-y-6">
                                    {/* NFC Reader Card */}
                                    <div className="bg-white rounded-3xl shadow-sm p-6 border border-slate-200">
                                        <div className="flex items-center justify-between mb-6">
                                            <h3 className="font-black text-slate-800 uppercase tracking-tight">1. NFC Interface</h3>
                                            <div className={`h-2 w-2 rounded-full ${isScanning ? 'bg-green-500 animate-ping' : 'bg-slate-300'}`}></div>
                                        </div>
                                        <button 
                                            onClick={startNfcScan}
                                            disabled={isScanning}
                                            className={`w-full py-4 rounded-2xl font-black text-white transition-all shadow-md active:scale-95 ${isScanning ? 'bg-slate-100 text-slate-400' : 'bg-blue-600 hover:bg-blue-700'}`}
                                        >
                                            {isScanning ? 'Scanner Active' : 'Start Scanner'}
                                        </button>
                                        {currentTagSerial && (
                                            <div className="mt-4 p-4 bg-slate-50 border border-slate-100 rounded-2xl flex items-center justify-between">
                                                <div>
                                                    <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Selected Tag</p>
                                                    <p className="text-sm font-mono font-bold text-slate-600">{currentTagSerial}</p>
                                                </div>
                                                <button onClick={() => {setCurrentTagSerial(null); setTagData(null);}} className="text-xs text-red-400 font-bold">Clear</button>
                                            </div>
                                        )}
                                    </div>

                                    {/* Wallet Details */}
                                    <div className="bg-white rounded-3xl shadow-sm p-6 border border-slate-200">
                                        <h3 className="font-black text-slate-800 uppercase tracking-tight mb-6">2. Wallet Operations</h3>
                                        {!currentTagSerial ? (
                                            <div className="text-center py-10 opacity-30">
                                                <svg className="w-12 h-12 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"/></svg>
                                                <p className="text-sm font-bold">No Tag Identified</p>
                                            </div>
                                        ) : !tagData ? (
                                            <div className="space-y-4">
                                                <div className="bg-amber-50 border border-amber-100 p-4 rounded-2xl">
                                                    <p className="text-xs font-bold text-amber-700 uppercase mb-1 tracking-tighter">Registration Required</p>
                                                    <input 
                                                        type="email" 
                                                        value={ownerEmail}
                                                        onChange={(e) => setOwnerEmail(e.target.value)}
                                                        placeholder="Owner's Corporate Email"
                                                        className="w-full bg-white border border-amber-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-amber-500 outline-none font-semibold transition-all"
                                                    />
                                                </div>
                                                <button onClick={initiateRegister} className="w-full py-4 bg-slate-900 text-white rounded-2xl font-black shadow-lg shadow-slate-200 hover:bg-black transition-all active:scale-95">
                                                    Initialize & Write to Card
                                                </button>
                                            </div>
                                        ) : (
                                            <div className="space-y-6">
                                                <div className="bg-emerald-50 border-2 border-emerald-100 p-6 rounded-3xl text-center shadow-inner">
                                                    <p className="text-[10px] text-emerald-600 font-black uppercase tracking-[0.2em] mb-1">Live Credit Balance</p>
                                                    <p className="text-5xl font-black text-emerald-800">${(tagData.balance || 0).toFixed(2)}</p>
                                                    <p className="text-[10px] text-emerald-600/60 font-mono mt-2">{tagData.ownerEmail} • {tagData.internalId}</p>
                                                </div>
                                                
                                                <div className="space-y-2">
                                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Transaction Amount</label>
                                                    <input 
                                                        type="number" 
                                                        value={amount}
                                                        onChange={(e) => setAmount(e.target.value)}
                                                        placeholder="0.00"
                                                        className="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:border-blue-500 outline-none font-black text-xl text-slate-700 transition-all"
                                                    />
                                                </div>

                                                <div className="grid grid-cols-2 gap-4">
                                                    <button onClick={initiatePay} className="py-4 bg-blue-600 text-white rounded-2xl font-black shadow-md hover:bg-blue-700 active:scale-95">Pay</button>
                                                    <button onClick={initiateTopUp} className="py-4 bg-emerald-600 text-white rounded-2xl font-black shadow-md hover:bg-emerald-700 active:scale-95">Top Up</button>
                                                </div>
                                                
                                                <button onClick={initiateDelete} className="w-full text-red-300 hover:text-red-500 text-[10px] font-black uppercase tracking-widest pt-4 border-t border-slate-50">
                                                    Wipe Card Data
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* Activity Log */}
                                <div className="bg-slate-900 rounded-3xl shadow-2xl p-6 border border-slate-800 flex flex-col h-[600px]">
                                    <div className="flex justify-between items-center mb-6">
                                        <h3 className="text-xs font-black text-slate-500 uppercase tracking-widest">Real-time Activity</h3>
                                        <button onClick={() => setNfcLog([])} className="text-[10px] bg-slate-800 px-3 py-1 rounded-full text-slate-400 hover:text-white transition-colors">Clear</button>
                                    </div>
                                    <div className="flex-1 overflow-y-auto space-y-4 font-mono text-xs pr-2 custom-scrollbar">
                                        {nfcLog.length === 0 ? (
                                            <p className="text-slate-700 italic text-center mt-20">Waiting for interaction...</p>
                                        ) : (
                                            nfcLog.map((log) => (
                                                <div key={log.id} className="border-l-2 border-slate-700 pl-4 py-1">
                                                    <div className="flex justify-between items-center mb-1">
                                                        <span className="text-slate-600">[{log.time}]</span>
                                                        <span className={`px-2 py-0.5 rounded text-[8px] font-black uppercase tracking-tighter ${log.type === 'error' ? 'bg-red-500/10 text-red-500' : log.type === 'success' ? 'bg-emerald-500/10 text-emerald-500' : 'bg-blue-500/10 text-blue-400'}`}>
                                                            {log.type}
                                                        </span>
                                                    </div>
                                                    <p className="text-slate-200 leading-relaxed font-medium">{log.msg}</p>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            // Login logic remains the same
            return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-slate-50">
                    <div className="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl p-8 lg:p-12 border border-slate-100">
                        <div className="text-center mb-12">
                            <div className="mx-auto w-24 h-24 bg-blue-600 rounded-[2rem] flex items-center justify-center mb-8 shadow-xl rotate-3">
                                <svg className="w-12 h-12 text-white -rotate-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                            </div>
                            <h2 className="text-4xl font-black text-slate-900 tracking-tight">Power Studios</h2>
                            <p className="text-xs text-slate-400 font-bold uppercase tracking-widest mt-3 italic">Internal Management</p>
                        </div>
                        <form onSubmit={handleSubmit} className="space-y-6">
                            {error && <div className="bg-red-50 border-2 border-red-100 p-4 rounded-2xl text-[10px] text-red-700 font-black uppercase tracking-tight">{error}</div>}
                            <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} className="block w-full px-6 py-5 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-blue-500 focus:outline-none transition-all text-sm font-bold" placeholder="Email"/>
                            <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} className="block w-full px-6 py-5 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-blue-500 focus:outline-none transition-all text-sm font-bold" placeholder="Password"/>
                            <button type="submit" disabled={isLoading} className="w-full py-5 rounded-2xl shadow-xl text-sm font-black text-white bg-blue-600 hover:bg-blue-700 transform transition-all active:scale-95 flex items-center justify-center">
                                {isLoading ? 'Authenticating...' : 'Authenticate Access'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
