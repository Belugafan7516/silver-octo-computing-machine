<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power Studios Portal</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel standalone for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 antialiased selection:bg-blue-200">
    <!-- React will mount here -->
    <div id="root"></div>

    <!-- Note the type="text/babel" and data-type="module" which is crucial for Babel to process ES imports -->
    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-analytics.js";

        const { useState, useEffect } = React;

        // Your web app's Firebase configuration hardcoded directly
        const firebaseConfig = {
            apiKey: "AIzaSyCtbA4ro1ZU429f9HTn29DHjVCpq4t-N-s",
            authDomain: "kisok-a496b.firebaseapp.com",
            projectId: "kisok-a496b",
            storageBucket: "kisok-a496b.firebasestorage.app",
            messagingSenderId: "850722698358",
            appId: "1:850722698358:web:a1603cbb7aafccecebdb57",
            measurementId: "G-E8KG84NDCQ"
        };

        // App ID for Firestore path structure
        const appId = "kisok-a496b";

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let analytics;
        try {
            analytics = getAnalytics(app);
        } catch (e) {
            console.warn("Analytics blocked or not supported in this environment.");
        }

        function App() {
            const [email, setEmail] = useState('default@eugeneevons.com');
            const [password, setPassword] = useState('kiosk1');
            const [error, setError] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [user, setUser] = useState(null);

            // NFC States
            const [nfcLog, setNfcLog] = useState([]);
            const [isScanning, setIsScanning] = useState(false);
            
            // Tag Management States
            const [currentTagSerial, setCurrentTagSerial] = useState(null);
            const [tagData, setTagData] = useState(null);
            const [amount, setAmount] = useState('');

            // Listen for Firebase auth state changes
            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                });
                return () => unsubscribe();
            }, []);

            // Listen for active tag data via Firestore
            useEffect(() => {
                if (!user || !currentTagSerial || !db) return;
                
                // Path following RULE 1: /artifacts/{appId}/public/data/{collectionName}/{docId}
                const tagRef = doc(db, 'artifacts', appId, 'public', 'data', 'tags', currentTagSerial);
                
                const unsubscribe = onSnapshot(tagRef, (docSnap) => {
                    if (docSnap.exists()) {
                        setTagData(docSnap.data());
                    } else {
                        setTagData(null);
                    }
                }, (err) => {
                    addLog(`Firestore Error: ${err.code} - ${err.message}`, 'error');
                });
                return () => unsubscribe();
            }, [user, currentTagSerial]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                setIsLoading(true);

                try {
                    // Attempting standard Email/Password sign-in with your provided config
                    await signInWithEmailAndPassword(auth, email, password);
                } catch (err) {
                    console.error("Auth Error:", err);
                    let userMsg = "Authentication failed.";
                    
                    if (err.code === 'auth/operation-not-allowed') {
                        userMsg = "ERROR: Email/Password login is not enabled in your Firebase Console.";
                    } else if (err.code === 'auth/invalid-credential') {
                        userMsg = "Invalid email or password.";
                    } else if (err.code === 'auth/network-request-failed') {
                        userMsg = "Network error. Check your internet connection.";
                    } else {
                        userMsg = `Error [${err.code}]: ${err.message}`;
                    }
                    setError(userMsg);
                } finally {
                    setIsLoading(false);
                }
            };

            const handleSignOut = async () => {
                await signOut(auth);
                setEmail('default@eugeneevons.com');
                setPassword('kiosk1');
                setNfcLog([]);
                setIsScanning(false);
                setCurrentTagSerial(null);
                setTagData(null);
            };

            const handleRegister = async () => {
                if (!user || !currentTagSerial) return;
                try {
                    const tagRef = doc(db, 'artifacts', appId, 'public', 'data', 'tags', currentTagSerial);
                    await setDoc(tagRef, { 
                        balance: 0, 
                        registeredAt: new Date().toISOString(),
                        createdBy: user.uid 
                    });
                    addLog(`Registered Tag: ${currentTagSerial}`, 'success');
                } catch(err) { addLog(`Register Error: ${err.message}`, 'error'); }
            };

            const handleTopUp = async () => {
                if (!user || !tagData || !amount) return;
                const val = parseFloat(amount);
                if (isNaN(val) || val <= 0) return addLog('Invalid amount', 'error');
                try {
                    const tagRef = doc(db, 'artifacts', appId, 'public', 'data', 'tags', currentTagSerial);
                    await updateDoc(tagRef, { balance: tagData.balance + val });
                    addLog(`Topped up $${val.toFixed(2)}`, 'success');
                    setAmount('');
                } catch(err) { addLog(`Top Up Error: ${err.message}`, 'error'); }
            };

            const handlePay = async () => {
                if (!user || !tagData || !amount) return;
                const val = parseFloat(amount);
                if (isNaN(val) || val <= 0) return addLog('Invalid amount', 'error');
                if (tagData.balance < val) return addLog('Insufficient funds!', 'error');
                try {
                    const tagRef = doc(db, 'artifacts', appId, 'public', 'data', 'tags', currentTagSerial);
                    await updateDoc(tagRef, { balance: tagData.balance - val });
                    addLog(`Charged $${val.toFixed(2)}`, 'success');
                    setAmount('');
                } catch(err) { addLog(`Charge Error: ${err.message}`, 'error'); }
            };

            const handleDelete = async () => {
                if (!user || !currentTagSerial) return;
                try {
                    const tagRef = doc(db, 'artifacts', appId, 'public', 'data', 'tags', currentTagSerial);
                    await deleteDoc(tagRef);
                    addLog(`Deleted Tag: ${currentTagSerial}`, 'success');
                    setTagData(null);
                } catch(err) { addLog(`Delete Error: ${err.message}`, 'error'); }
            };

            const addLog = (msg, type = 'info') => {
                setNfcLog(prev => [{ id: Date.now() + Math.random(), time: new Date().toLocaleTimeString(), msg, type }, ...prev]);
            };

            const startNfcScan = async () => {
                try {
                    if (!('NDEFReader' in window)) {
                        addLog('Web NFC not supported on this browser/device.', 'error');
                        return;
                    }
                    const ndef = new NDEFReader();
                    await ndef.scan();
                    setIsScanning(true);
                    addLog('Scanner Active. Tap your tag...', 'info');

                    ndef.addEventListener("readingerror", () => {
                        addLog('NFC Read Error.', 'error');
                    });

                    ndef.addEventListener("reading", ({ serialNumber }) => {
                        if (serialNumber) {
                            addLog(`Tag detected: ${serialNumber}`, 'success');
                            setCurrentTagSerial(serialNumber);
                        }
                    });
                } catch (error) {
                    addLog(`NFC Error: ${error.message}`, 'error');
                    setIsScanning(false);
                }
            };

            // Dashboard
            if (user) {
                return (
                    <div className="min-h-screen bg-slate-100 p-4 sm:p-6 lg:p-8">
                        <div className="max-w-3xl mx-auto space-y-6">
                            <div className="bg-white rounded-2xl shadow-sm p-6 flex items-center justify-between border border-slate-200">
                                <div className="flex items-center space-x-4">
                                    <div className="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center shadow-md">
                                        <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                                        </svg>
                                    </div>
                                    <div>
                                        <h2 className="text-xl font-bold text-slate-900">Power Studios</h2>
                                        <p className="text-xs text-slate-500 font-mono">{user.email}</p>
                                    </div>
                                </div>
                                <button onClick={handleSignOut} className="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium rounded-lg transition-colors text-sm">
                                    Sign Out
                                </button>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className="space-y-6">
                                    <div className="bg-white rounded-2xl shadow-sm p-6 border border-slate-200">
                                        <h3 className="text-lg font-semibold text-slate-800 mb-4">1. Scan Card</h3>
                                        <button 
                                            onClick={startNfcScan}
                                            disabled={isScanning}
                                            className={`w-full py-4 px-4 rounded-xl font-bold text-white transition-all shadow-md ${isScanning ? 'bg-blue-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700 active:scale-95'}`}
                                        >
                                            {isScanning ? 'Scanner Active' : 'Start Scanning'}
                                        </button>
                                        {currentTagSerial && (
                                            <div className="mt-4 p-3 bg-slate-50 border border-slate-200 rounded-lg flex items-center justify-between">
                                                <span className="text-xs font-mono text-slate-500">ID: {currentTagSerial}</span>
                                                <button onClick={() => {setCurrentTagSerial(null); setTagData(null);}} className="text-xs text-red-500">Clear</button>
                                            </div>
                                        )}
                                    </div>

                                    <div className="bg-white rounded-2xl shadow-sm p-6 border border-slate-200">
                                        <h3 className="text-lg font-semibold text-slate-800 mb-4">2. Wallet Status</h3>
                                        {!currentTagSerial ? (
                                            <p className="text-sm text-slate-400 italic text-center py-6">Tap a card to start</p>
                                        ) : !tagData ? (
                                            <div className="text-center py-2 space-y-4">
                                                <div className="text-sm text-amber-700 bg-amber-50 p-4 rounded-xl border border-amber-200">New Tag Detected</div>
                                                <button onClick={handleRegister} className="w-full py-3 bg-slate-800 text-white rounded-xl font-bold">Register Card</button>
                                            </div>
                                        ) : (
                                            <div className="space-y-4">
                                                <div className="bg-emerald-50 border border-emerald-200 p-5 rounded-xl text-center">
                                                    <p className="text-xs text-emerald-600 font-bold uppercase tracking-widest mb-1">Balance</p>
                                                    <p className="text-4xl font-black text-emerald-800">${(tagData.balance || 0).toFixed(2)}</p>
                                                </div>
                                                <input 
                                                    type="number" 
                                                    value={amount}
                                                    onChange={(e) => setAmount(e.target.value)}
                                                    placeholder="$0.00"
                                                    className="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none font-mono"
                                                />
                                                <div className="grid grid-cols-2 gap-3">
                                                    <button onClick={handlePay} className="py-3 bg-blue-600 text-white rounded-xl font-bold active:scale-95">Pay</button>
                                                    <button onClick={handleTopUp} className="py-3 bg-emerald-600 text-white rounded-xl font-bold active:scale-95">Top Up</button>
                                                </div>
                                                <button onClick={handleDelete} className="w-full py-2 text-red-400 hover:text-red-600 text-xs font-bold pt-4">Delete Card Data</button>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                <div className="bg-slate-900 rounded-2xl shadow-xl p-6 border border-slate-800 flex flex-col h-[520px]">
                                    <h3 className="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">Activity Log</h3>
                                    <div className="flex-1 overflow-y-auto space-y-3 font-mono text-xs pr-2">
                                        {nfcLog.map((log) => (
                                            <div key={log.id} className="border-l-2 border-slate-800 pl-3 py-1">
                                                <span className="text-slate-600">[{log.time}]</span>{' '}
                                                <span className={`${log.type === 'error' ? 'text-red-400' : log.type === 'success' ? 'text-green-400' : 'text-blue-300'}`}>
                                                    {log.msg}
                                                </span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            // Login Screen
            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="max-w-md w-full bg-white rounded-3xl shadow-2xl p-8 sm:p-10 border border-slate-100">
                        <div className="text-center mb-10">
                            <div className="mx-auto w-20 h-20 bg-blue-600 rounded-2xl flex items-center justify-center mb-6 shadow-xl">
                                <svg className="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                                </svg>
                            </div>
                            <h2 className="text-3xl font-black text-slate-900">Power Studios</h2>
                            <p className="text-sm text-slate-500 font-medium">Internal Management Portal</p>
                        </div>

                        <form onSubmit={handleSubmit} className="space-y-6">
                            {error && (
                                <div className="bg-red-50 border-2 border-red-100 p-4 rounded-2xl text-xs text-red-700 font-bold uppercase tracking-tight">
                                    {error}
                                </div>
                            )}
                            <div>
                                <label className="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Email</label>
                                <input
                                    type="email"
                                    value={email}
                                    onChange={(e) => setEmail(e.target.value)}
                                    className="block w-full px-5 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-blue-500 focus:outline-none transition-all text-sm font-semibold"
                                    placeholder="user@eugeneevons.com"
                                />
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Password</label>
                                <input
                                    type="password"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    className="block w-full px-5 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-blue-500 focus:outline-none transition-all text-sm font-semibold"
                                    placeholder="••••••••"
                                />
                            </div>
                            <button
                                type="submit"
                                disabled={isLoading}
                                className="w-full py-4 rounded-2xl shadow-lg text-sm font-black text-white bg-blue-600 hover:bg-blue-700 transform transition-all active:scale-95 flex items-center justify-center"
                            >
                                {isLoading ? (
                                    <svg className="animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
                                        <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                        <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                    </svg>
                                ) : 'Authenticate'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
